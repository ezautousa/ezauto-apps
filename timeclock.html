/* Build the payroll email {subject, body, to} for the given period.
   Shared between the Reports-tab button and the kiosk button. */
function buildPayrollEmail(start, weeksToInclude) {
  const endDate = new Date(start); endDate.setDate(endDate.getDate() + (weeksToInclude * 7) - 1);
  const dayLabels = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

  // Build per-employee data including daily punch detail
  const rows = S.employees.filter(e => e.active).map(emp => {
    let regular = 0, overtime = 0, pto = 0;
    const dailyDetail = []; // [{date, dayName, punches: [{in, out, hrs, lunch}], dayTotal, ptoHrs}]

    for (let i = 0; i < weeksToInclude; i++) {
      const wStart = new Date(start); wStart.setDate(wStart.getDate() + i*7);
      const h = calcWeekHours(emp.id, wStart);
      regular += h.regular; overtime += h.overtime; pto += h.pto;

      // For each day in this week, gather punches
      for (let dOff = 0; dOff < 7; dOff++) {
        const dayStart = new Date(wStart); dayStart.setDate(dayStart.getDate() + dOff); dayStart.setHours(0,0,0,0);
        const dayEnd = new Date(dayStart); dayEnd.setDate(dayEnd.getDate() + 1);

        const punches = S.timeEntries
          .filter(e => e.employeeId === emp.id && e.clockIn && e.clockOut)
          .filter(e => {
            const t = new Date(e.clockIn).getTime();
            return t >= dayStart.getTime() && t < dayEnd.getTime();
          })
          .sort((a,b) => new Date(a.clockIn) - new Date(b.clockIn));

        const ptoToday = S.ptoTransactions
          .filter(p => p.employeeId === emp.id && p.type === "used")
          .filter(p => {
            const pd = parseDateLocal(p.date);
            return pd.getTime() === dayStart.getTime();
          })
          .reduce((sum, p) => sum + p.hours, 0);

        if (punches.length > 0 || ptoToday > 0) {
          const dayTotal = punches.reduce((s, e) => s + entryHours(e), 0);
          dailyDetail.push({
            date: dayStart,
            dayName: dayLabels[dayStart.getDay()],
            punches: punches.map(p => ({
              clockIn: p.clockIn,
              clockOut: p.clockOut,
              hrs: entryHours(p),
              lunchDeducted: !!p.autoLunchDeducted,
              edited: !!p.editedByManager
            })),
            dayTotal,
            ptoHrs: ptoToday
          });
        }
      }
    }
    return { emp, regular, overtime, pto, total: regular+overtime+pto, dailyDetail };
  });

  const totals = rows.reduce((a,r) => ({
    regular: a.regular + r.regular, overtime: a.overtime + r.overtime,
    pto: a.pto + r.pto, total: a.total + r.total
  }), { regular:0, overtime:0, pto:0, total:0 });

  const companyName = S.settings.companyName || "EZ AUTO";
  const periodLabel = `From ${fmtDateFull(start)} to ${fmtDateFull(endDate)}`;
  const now = new Date();

  // Helper: pad string to fixed width for alignment
  const pad = (s, n, right) => {
    s = String(s);
    if (s.length >= n) return s.slice(0, n);
    return right ? s.padStart(n) : s.padEnd(n);
  };

  let body = "";
  body += `${companyName.toUpperCase()} — PAYROLL REPORT\n`;
  body += `${periodLabel}\n`;
  body += `Generated ${now.toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"})} at ${fmtTime(now)}\n`;
  body += `\n`;
  body += `─────────────────────────────────────────────\n`;
  body += `  COMPANY TOTALS\n`;
  body += `─────────────────────────────────────────────\n`;
  body += `  Regular:   ${fmtHrs(totals.regular).padStart(7)} hrs\n`;
  body += `  Overtime:  ${fmtHrs(totals.overtime).padStart(7)} hrs\n`;
  body += `  PTO:       ${fmtHrs(totals.pto).padStart(7)} hrs\n`;
  body += `  ─────────────────────\n`;
  body += `  TOTAL:     ${fmtHrs(totals.total).padStart(7)} hrs\n`;
  body += `\n\n`;

  // Per-employee detail with daily breakdown
  body += `═════════════════════════════════════════════\n`;
  body += `  EMPLOYEE DETAIL\n`;
  body += `═════════════════════════════════════════════\n\n`;

  rows.forEach((r, idx) => {
    const exemptNote = r.emp.overtimeEligible ? "" : " [salaried — no OT]";
    body += `▼ ${r.emp.name.toUpperCase()}${exemptNote}\n`;
    body += `─────────────────────────────────────────────\n`;

    if (r.dailyDetail.length === 0) {
      body += `  (no time recorded this period)\n\n`;
    } else {
      r.dailyDetail.forEach(day => {
        const dateStr = `${day.dayName} ${day.date.getMonth()+1}/${day.date.getDate()}`;
        body += `  ${pad(dateStr, 8)}  `;

        if (day.punches.length === 0 && day.ptoHrs > 0) {
          body += `PTO: ${fmtHrs(day.ptoHrs)} hrs\n`;
        } else {
          // First punch on the day-row line
          const first = day.punches[0];
          const lunchTag = first.lunchDeducted ? " (-30m lunch)" : "";
          const editedTag = first.edited ? " *edited" : "";
          body += `${fmtTime(first.clockIn)} → ${fmtTime(first.clockOut)}${lunchTag}${editedTag}  =  ${fmtHrs(first.hrs)} hrs\n`;

          // Additional punches indented
          for (let i = 1; i < day.punches.length; i++) {
            const p = day.punches[i];
            const lt = p.lunchDeducted ? " (-30m lunch)" : "";
            const et = p.edited ? " *edited" : "";
            body += `            ${fmtTime(p.clockIn)} → ${fmtTime(p.clockOut)}${lt}${et}  =  ${fmtHrs(p.hrs)} hrs\n`;
          }

          // Day total if multiple punches OR if PTO also on same day
          if (day.punches.length > 1 || day.ptoHrs > 0) {
            body += `            ─────────────────────\n`;
            body += `            Day total: ${fmtHrs(day.dayTotal)} hrs`;
            if (day.ptoHrs > 0) body += ` + ${fmtHrs(day.ptoHrs)} PTO`;
            body += `\n`;
          }
        }
      });
      body += `\n`;
      body += `  Reg ${fmtHrs(r.regular)}  |  OT ${fmtHrs(r.overtime)}  |  PTO ${fmtHrs(r.pto)}  |  TOTAL ${fmtHrs(r.total)} hrs\n`;
    }
    body += `\n`;
  });

  // CSV summary at the end for Paychex paste
  body += `═════════════════════════════════════════════\n`;
  body += `  CSV SUMMARY (paste into Paychex or Excel)\n`;
  body += `═════════════════════════════════════════════\n`;
  body += `Employee,Regular,Overtime,PTO,Total,Exempt\n`;
  rows.forEach(r => {
    body += `"${csvSafe(r.emp.name)}",${fmtHrs(r.regular)},${fmtHrs(r.overtime)},${fmtHrs(r.pto)},${fmtHrs(r.total)},${r.emp.overtimeEligible?"No":"Yes"}\n`;
  });
  body += `\n`;
  body += `Overtime calculated per workweek. PTO hours do not count toward the 40-hr OT threshold.\n`;
  body += `Times marked *edited were modified by a manager.\n`;
  body += `\n`;
  body += `— Sent from ${companyName} Time Clock\n`;

  return {
    to: (S.settings.payrollEmail || "").trim(),
    subject: `${companyName} Payroll — ${periodLabel}`,
    body,
    periodLabel,
    rows
  };
}

/* Find the start date of the most recently completed workweek. */
function lastCompleteWeekStart() {
  const today = new Date();
  today.setHours(0,0,0,0);
  let d = new Date(today);
  d.setDate(d.getDate() - 1); // yesterday
  const lastDayOfWeek = (S.settings.workWeekStartDay + 6) % 7;
  let safety = 8;
  while (d.getDay() !== lastDayOfWeek && safety-- > 0) {
    d.setDate(d.getDate() - 1);
  }
  const start = new Date(d);
  start.setDate(start.getDate() - 6);
  start.setHours(0,0,0,0);
  return start;
}

function rpEmail() {
  const len = parseInt(document.getElementById("rp-len").value);
  const start = parseDateLocal(rpStart);
  const weeksToInclude = len / 7;
  const email = buildPayrollEmail(start, weeksToInclude);

  if (!email.to) {
    if (!confirm("No email address is set in Settings. Continue anyway and pick a recipient yourself?")) return;
  }

  triggerEmailWithFallback(email);
}

/* PRIMARY EMAIL PATH: send through EmailJS (free tier, 200/month).
   No leaving the app, no mailto, no copy-paste — the email is sent
   directly from the browser through ezautotimeclock@gmail.com.

   FALLBACKS (in order of preference):
   1. EmailJS send → SUCCESS → show success, return to kiosk
   2. EmailJS fails (offline, quota exceeded, key revoked) →
      try mailto: as before (Mail app prefilled)
   3. mailto: too long for iOS → copy/paste modal
*/
function triggerEmailWithFallback(email, returnToKiosk) {
  // Show a brief "sending..." state so the user knows something's happening
  const sendingId = "emailjs-sending-" + Date.now();
  openModal(`
    <div id="${sendingId}" style="text-align:center;padding:24px 16px;">
      <div style="font-size:48px;margin-bottom:16px;">📤</div>
      <h3 style="margin-bottom:8px;">Sending report...</h3>
      <p style="font-size:13px;color:var(--text2);">Delivering to ${escapeHTML(email.to || "manager")}</p>
    </div>
  `);

  sendViaEmailJS(email)
    .then(() => {
      // Success — show confirmation and return to kiosk
      closeModal();
      if (returnToKiosk) {
        showSendSuccess();
      } else {
        openModal(`
          <div style="text-align:center;padding:24px 16px;">
            <div style="font-size:56px;margin-bottom:8px;">✓</div>
            <h3>Report sent</h3>
            <p style="font-size:14px;color:var(--text2);margin:12px 0 20px;">
              Delivered to ${escapeHTML(email.to)}
            </p>
            <button class="btn primary" onclick="closeModal()">Done</button>
          </div>
        `);
      }
    })
    .catch((err) => {
      console.warn("EmailJS send failed, falling back to mailto:", err);
      closeModal();
      // Fall back to the old mailto: flow so the user still has a way to send
      triggerEmailFallbackMailto(email, returnToKiosk);
    });
}

/* Send via EmailJS. Returns a promise. Rejects if SDK not loaded, no internet,
   quota exceeded, or any API error. */
function sendViaEmailJS(email) {
  return new Promise((resolve, reject) => {
    if (!window.emailjs || !window.EMAILJS_READY) {
      reject(new Error("EmailJS SDK not loaded"));
      return;
    }
    if (!email.to) {
      reject(new Error("No recipient email configured. Set payroll email in Settings."));
      return;
    }
    const cfg = window.EMAILJS_CONFIG;
    const params = {
      to_email: email.to,
      subject: email.subject,
      message: email.body
    };
    window.emailjs.send(cfg.serviceId, cfg.templateId, params)
      .then(resolve)
      .catch(reject);
  });
}

/* OLD mailto: flow, now used as fallback when EmailJS fails */
function triggerEmailFallbackMailto(email, returnToKiosk) {
  const mailto = `mailto:${encodeURIComponent(email.to)}?subject=${encodeURIComponent(email.subject)}&body=${encodeURIComponent(email.body)}`;

  // mailto: URLs over ~6000 chars get truncated by iOS Mail. Skip mailto entirely
  // for big reports — show the formatted copy modal instead so the user gets
  // the full content reliably.
  if (mailto.length > 6000) {
    showOversizedEmailModal(email);
    return;
  }

  let mailOpened = false;

  // If the page becomes hidden, Mail (or another handler) opened
  function onVisibilityChange() {
    if (document.hidden) {
      mailOpened = true;
    } else if (mailOpened) {
      // User came back from Mail — clean up and optionally return to kiosk
      document.removeEventListener("visibilitychange", onVisibilityChange);
      if (returnToKiosk) {
        showSendSuccess();
      }
    }
  }
  document.addEventListener("visibilitychange", onVisibilityChange);

  // Try to open Mail
  try {
    window.location.href = mailto;
  } catch(e) { /* ignore */ }

  // After a short delay: if Mail didn't open (page never hid), show the fallback modal
  setTimeout(() => {
    if (mailOpened) return; // Mail handled it — no fallback needed
    document.removeEventListener("visibilitychange", onVisibilityChange);
    openModal(`
      <h3>Couldn't send automatically</h3>
      <p style="font-size:13px;color:var(--text2);margin-bottom:14px;">
        Internet may be down, or the email service is unreachable. Copy the content below and paste into any email app, or try again later.
      </p>
      <div class="field">
        <label>To</label>
        <input type="text" id="em-to" value="${escapeHTML(email.to)}" readonly>
      </div>
      <div class="field">
        <label>Subject</label>
        <input type="text" id="em-subject" value="${escapeHTML(email.subject)}" readonly>
      </div>
      <div class="field">
        <label>Message</label>
        <textarea id="em-body" readonly style="min-height:200px;font-family:ui-monospace,'SF Mono',monospace;font-size:12px;">${escapeHTML(email.body)}</textarea>
      </div>
      <div class="row" style="flex-wrap:wrap;gap:8px;">
        <button class="btn small" onclick="copyEmailPart('em-to','Email address')">Copy address</button>
        <button class="btn small" onclick="copyEmailPart('em-subject','Subject')">Copy subject</button>
        <button class="btn small" onclick="copyEmailPart('em-body','Report')">Copy report</button>
        <button class="btn small primary" onclick="copyFullEmail()">Copy everything</button>
      </div>
      <div class="row end" style="margin-top:16px;">
        <button class="btn" onclick="retryMailto('${encodeURIComponent(mailto)}')">Try Mail app</button>
        <button class="btn primary" onclick="closeModal()">Done</button>
      </div>
    `);
  }, 1200);
}

/* Brief success screen shown when user returns from Mail, then auto-return to kiosk */
function showSendSuccess() {
  closeModal();
  showConfirm({
    type: "in",
    name: "",
    action: "Report sent",
    time: "",
    detail: "Thanks! Returning to clock-in screen..."
  });
  setTimeout(() => show("kiosk"), 2500);
}

/* When the report is too long for mailto, show a clear "tap to copy then paste in Mail" flow */
function showOversizedEmailModal(email) {
  openModal(`
    <h3>Report ready — copy &amp; paste into Mail</h3>
    <p style="font-size:13px;color:var(--text2);margin-bottom:14px;">
      This report is detailed, so it's too long to fit in the auto-fill. Tap <b>Copy report</b>, then open Mail, paste into a new message to <b>${escapeHTML(email.to || 'your manager')}</b>, and tap Send.
    </p>
    <div class="field">
      <label>To</label>
      <input type="text" id="em-to" value="${escapeHTML(email.to)}" readonly>
    </div>
    <div class="field">
      <label>Subject</label>
      <input type="text" id="em-subject" value="${escapeHTML(email.subject)}" readonly>
    </div>
    <div class="field">
      <label>Report (preview)</label>
      <textarea id="em-body" readonly style="min-height:240px;font-family:ui-monospace,'SF Mono',monospace;font-size:11px;white-space:pre;">${escapeHTML(email.body)}</textarea>
    </div>
    <div class="row" style="flex-wrap:wrap;gap:8px;">
      <button class="btn small" onclick="copyEmailPart('em-to','Email address')">Copy address</button>
      <button class="btn small" onclick="copyEmailPart('em-subject','Subject')">Copy subject</button>
      <button class="btn small primary" onclick="copyEmailPart('em-body','Report')">Copy report</button>
    </div>
    <div class="row end" style="margin-top:16px;">
      <button class="btn primary" onclick="closeModal()">Done</button>
    </div>
  `);
}

function copyEmailPart(id, label) {
  const el = document.getElementById(id);
  if (!el) return;
  el.select();
  navigator.clipboard.writeText(el.value).then(() => toast(label + " copied"))
    .catch(() => toast("Select the text and copy manually"));
}

function copyFullEmail() {
  const to = document.getElementById("em-to").value;
  const sub = document.getElementById("em-subject").value;
  const body = document.getElementById("em-body").value;
  const full = `To: ${to}\nSubject: ${sub}\n\n${body}`;
  navigator.clipboard.writeText(full).then(() => toast("Email copied — paste into any mail app"))
    .catch(() => toast("Copy failed — select text manually"));
}

function retryMailto(encodedMailto) {
  window.location.href = decodeURIComponent(encodedMailto);
}

  page.innerHTML = `

      <h2>Workweek & overtime</h2>
      <div class="card-sub">Florida follows federal FLSA — OT is 1.5× after 40 hrs in a workweek. Pick the day your workweek starts.</div>

          </select>
        </div>
        <div class="field">
          <label>Overtime threshold (hrs/wk)</label>
          <input type="number" id="s-ot" value="${s.overtimeThreshold}" min="0" step="0.5">

    </div>

      <h2>Lunch deduction</h2>
      <div class="card-sub">When a shift is longer than the threshold, the system automatically deducts the lunch break. No prompt shown. If an employee reports they worked through lunch, edit their punch in Timesheet to uncheck the deduction.</div>
      <div class="field-row">
        <div class="field">
          <label>Auto-deduct when shift &gt; (hours)</label>
          <input type="number" id="s-lh" value="${s.lunchThresholdHours}" min="0" step="0.5">
        </div>
        <div class="field">
          <label>Deduction (minutes)</label>
          <input type="number" id="s-lm" value="${s.lunchDurationMinutes}" min="0" step="5">
        </div>
      </div>
    </div>

    <div class="card">
      <h2>PTO display</h2>
      <div class="card-sub">How many hours equal one day when showing PTO balances. Default is 8 for full-time employees.</div>
      <div class="field">
        <label>Hours per PTO day</label>
        <input type="number" id="s-ppd" value="${s.hoursPerPtoDay || 8}" min="1" step="0.5">
      </div>
    </div>

    <div class="card">
      <h2>Manager PIN</h2>
      <div class="card-sub">Keep this private. Anyone with this PIN can view and edit all data.</div>
      <div class="field-row">
        <div class="field">
          <label>New manager PIN (4+ digits)</label>
          <input type="text" id="s-mpin" value="" placeholder="Leave blank to keep current" inputmode="numeric">
        </div>
        <div class="field">
          <label>Confirm</label>
          <input type="text" id="s-mpin2" value="" placeholder="Retype" inputmode="numeric">
        </div>
      </div>
    </div>

    <div class="row" style="margin-bottom:16px;">
      <button class="btn primary" onclick="saveSettings()">Save settings</button>
    </div>

    <div class="card">
      <h2>Email reports</h2>
      <div class="card-sub">When you tap "Email report" in the Reports tab, it opens the iPad's Mail app pre-filled with this address. For multiple recipients, separate with commas (e.g. ysmael@ezauto.com, german@ezauto.com).</div>
      <div class="field">
        <label>Send reports to</label>
        <input type="text" id="s-email" value="${escapeHTML(s.payrollEmail || '')}" placeholder="your@email.com">
      </div>
    </div>

      <h2>Camera test</h2>
      <div class="card-sub">Tap to verify the camera works. The photo is not saved — it's a deterrent to discourage employees from clocking in for each other.</div>
      <button class="btn" onclick="testCamera()">Test camera</button>
    </div>

      <div class="row">
        <button class="btn" onclick="exportData()">Export backup (JSON)</button>
        <button class="btn" onclick="document.getElementById('import-file').click()">Import backup</button>
        <input type="file" id="import-file" accept=".json,application/json" style="display:none;" onchange="importData(event)">

      <h2>Danger zone</h2>

}

function saveSettings() {
  S.settings.workWeekStartDay = parseInt(document.getElementById("s-dow").value);
  S.settings.overtimeThreshold = parseFloat(document.getElementById("s-ot").value) || 40;
  S.settings.lunchThresholdHours = parseFloat(document.getElementById("s-lh").value) || 6;
  S.settings.lunchDurationMinutes = parseFloat(document.getElementById("s-lm").value) || 30;
  S.settings.hoursPerPtoDay = parseFloat(document.getElementById("s-ppd").value) || 8;
  S.settings.payrollEmail = document.getElementById("s-email").value.trim();

  const mpin = document.getElementById("s-mpin").value.trim();
  const mpin2 = document.getElementById("s-mpin2").value.trim();
  if (mpin) {
    if (!/^\d{4,}$/.test(mpin)) { toast("Manager PIN must be at least 4 digits"); return; }
    if (mpin !== mpin2) { toast("PINs don't match"); return; }
    S.settings.managerPin = mpin;
  }
  save();
  toast("Settings saved");
}

function exportData() {
  const blob = new Blob([JSON.stringify(S, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "ezauto-timeclock-backup-" + fmtDateISO(new Date()) + ".json";
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
  toast("Backup downloaded");
}

function importData(event) {
  const file = event.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.employees || !Array.isArray(data.employees)) throw new Error("Invalid file");
      if (!confirm("Replace all current data with this backup? Current data will be lost.")) return;
      S = Object.assign(defaultState(), data);
      S.settings = Object.assign(defaultState().settings, data.settings || {});
      save();
      toast("Data imported");
      renderSettings();
    } catch(err) { toast("Import failed: " + err.message); }
  };
  reader.readAsText(file);
  event.target.value = "";
}

function resetAll() {
  if (!confirm("DELETE ALL DATA? This cannot be undone. Export a backup first if you want a safety net.")) return;
  if (!confirm("Really wipe everything? Last chance.")) return;
  S = defaultState();
  save();
  toast("All data reset");
  renderSettings();
}

/* ═══════════════════════════════════════════════ MODAL & TOAST ═══════════════════════════════════════════════ */
function openModal(html) {
  document.getElementById("modalBody").innerHTML = html;
  document.getElementById("modal").classList.add("active");
}
function closeModal() { document.getElementById("modal").classList.remove("active"); }

let toastTimer = null;
function toast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove("show"), 2200);
}
