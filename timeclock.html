<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="EZ AUTO Time">
<title>EZ AUTO — Time Clock</title>
<style>
  :root {
    --bg:         #ffffff;
    --bg2:        #f5f6f8;
    --bg3:        #eceef2;
    --bg-dark:    #111111;
    --text1:      #0f1117;
    --text2:      #52586a;
    --text3:      #9aa0b0;
    --border:     rgba(0,0,0,0.09);
    --border2:    rgba(0,0,0,0.15);
    --orange:     #ff6736;
    --orange-d:   #e5521f;
    --orange-bg:  #fff3ee;
    --blue:       #1b4e86;
    --blue-bg:    #e8f0fb;
    --green:      #10b981;
    --green-bg:   #ecfdf5;
    --red:        #dc2626;
    --red-bg:     #fef2f2;
    --r:          12px;
    --rsm:        8px;
    --rlg:        16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif;
    background: var(--bg);
    color: var(--text1);
    height: 100%;
    overflow: hidden;
    -webkit-user-select: none;
    user-select: none;
    -webkit-text-size-adjust: 100%;
    /* Lock the page so iOS Safari URL bar doesn't collapse/expand and shift content */
    position: fixed;
    width: 100%;
    overscroll-behavior: none;
    touch-action: manipulation;
  }

  input, textarea { -webkit-user-select: text; user-select: text; font-size: 16px; /* prevent iOS zoom */ }

  #app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    height: 100dvh; /* dynamic vh on iPadOS */
    max-width: 1366px; /* fit iPad Pro 13" landscape */
    margin: 0 auto;
    padding-left: env(safe-area-inset-left);
    padding-right: env(safe-area-inset-right);
    padding-bottom: env(safe-area-inset-bottom);
  }

  /* ── HEADER ── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    padding-top: env(safe-area-inset-top);
    background: #000000;
    border-bottom: none;
    flex-shrink: 0;
    height: calc(80px + env(safe-area-inset-top));
    overflow: hidden;
  }
  .logo-wrap {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 160px;
    height: 72px;
  }
  .logo-img {
    position: relative;
    z-index: 1;
    height: 72px;
    width: auto;
    object-fit: contain;
    margin-top: 6px;
    mix-blend-mode: screen;
  }
  .clock-wrap { text-align: center; }
  .clock-time {
    font-size: 26px;
    font-weight: 300;
    color: #ffffff;
    letter-spacing: -0.5px;
    line-height: 1;
  }
  .clock-date { font-size: 12px; color: rgba(255,255,255,0.4); margin-top: 4px; letter-spacing: 0.3px; }
  .mgr-btn {
    font-size: 11px;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.5);
    background: none;
    border: none;
    cursor: pointer;
    padding: 8px 12px;
    font-weight: 500;
  }
  .mgr-btn:active { color: #ffffff; }

  /* ── MAIN ── */
  .main { flex: 1; overflow: hidden; position: relative; }
  .view { position: absolute; inset: 0; display: none; overflow: auto; }
  .view.active { display: block; }

  /* ── KIOSK VIEW ── */
  .kiosk {
    display: flex;
    flex-direction: column;
    height: 100%;
    padding: 28px 28px;
  }
  @media (max-width: 1024px) and (orientation: portrait) {
    .kiosk { padding: 20px 24px; }
    .kiosk-greet { margin-bottom: 18px !important; }
  }
  .kiosk-greet {
    text-align: center;
    margin-bottom: 24px;
  }
  .kiosk-greet h1 {
    font-size: clamp(26px, 4vw, 38px);
    font-weight: 300;
    letter-spacing: -1px;
    color: var(--text1);
  }
  .kiosk-greet p {
    font-size: 14px;
    color: var(--text2);
    margin-top: 6px;
  }

  .kiosk-body {
    display: grid;
    grid-template-columns: 1fr 340px;
    gap: 28px;
    flex: 1;
    min-height: 0;
  }
  /* Portrait iPad and smaller: stack vertically */
  @media (max-width: 900px), (orientation: portrait) and (max-width: 1024px) {
    .kiosk-body { grid-template-columns: 1fr; gap: 20px; }
    .on-clock-panel { max-height: 280px; }
  }

  .kiosk-actions {
    display: flex;
    flex-direction: column;
    gap: 18px;
    justify-content: center;
  }

  .punch-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 32px 24px;
    font-size: clamp(22px, 3vw, 28px);
    font-weight: 500;
    letter-spacing: 0.5px;
    border: 2px solid var(--border2);
    background: var(--bg);
    color: var(--text1);
    border-radius: var(--rlg);
    cursor: pointer;
    transition: transform 0.06s ease, background 0.15s;
    min-height: clamp(120px, 16vh, 160px);
  }
  .punch-btn.in {
    background: var(--orange);
    color: #fff;
    border-color: var(--orange);
  }
  .punch-btn.out {
    background: var(--bg-dark);
    color: #fff;
    border-color: var(--bg-dark);
  }
  .punch-btn:active { transform: scale(0.98); }
  .punch-btn .ic { font-size: 32px; }

  .punch-btn-sub {
    display: block;
    width: 100%;
    padding: 14px 16px;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.5px;
    background: var(--bg);
    color: var(--text2);
    border: 1px solid var(--border2);
    border-radius: var(--rsm);
    cursor: pointer;
    transition: background 0.1s;
    margin-top: 4px;
  }
  .punch-btn-sub:active { background: var(--bg2); }

  .on-clock-panel {
    background: var(--bg2);
    border-radius: var(--rlg);
    padding: 20px;
    overflow-y: auto;
    max-height: 100%;
  }
  .on-clock-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 14px;
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--text3);
    text-transform: uppercase;
    font-weight: 600;
  }
  .on-clock-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--green);
  }
  .on-clock-empty {
    text-align: center;
    color: var(--text3);
    font-size: 13px;
    padding: 24px 0;
  }
  .on-clock-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 0;
    border-bottom: 0.5px solid var(--border);
  }
  .on-clock-row:last-child { border-bottom: none; }
  .on-clock-name { font-size: 15px; font-weight: 500; }
  .on-clock-time { font-size: 12px; color: var(--text3); }

  /* ── PIN PAD VIEW ── */
  .pinpad {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 24px;
    height: 100%;
    gap: 0;
  }
  .pin-title {
    font-size: clamp(22px, 3vw, 28px);
    font-weight: 400;
    color: var(--text1);
    margin-bottom: 8px;
    text-align: center;
  }
  .pin-subtitle {
    font-size: 15px;
    color: var(--text2);
    margin-bottom: 28px;
    text-align: center;
  }
  .pin-dots {
    display: flex;
    gap: 16px;
    margin-bottom: 36px;
    height: 24px;
  }
  .pin-dot {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 2px solid var(--border2);
    transition: background 0.1s;
  }
  .pin-dot.filled { background: var(--text1); border-color: var(--text1); }
  .pin-error .pin-dot { border-color: var(--red); background: var(--red); }

  .pin-grid {
    display: grid;
    grid-template-columns: repeat(3, clamp(86px, 11vw, 104px));
    gap: 14px;
    margin-bottom: 16px;
  }
  .pin-key {
    aspect-ratio: 1;
    font-size: clamp(26px, 3vw, 32px);
    font-weight: 300;
    background: var(--bg2);
    border: none;
    border-radius: var(--rlg);
    cursor: pointer;
    color: var(--text1);
    transition: background 0.08s;
  }
  .pin-key:active { background: var(--bg3); }
  .pin-key.small { font-size: 14px; font-weight: 600; color: var(--text2); letter-spacing: 0.5px; }
  .pin-cancel {
    margin-top: 12px;
    background: none;
    border: none;
    color: var(--text3);
    font-size: 15px;
    padding: 14px 20px;
    cursor: pointer;
  }
  .pin-cancel:active { color: var(--text1); }

  /* ── CONFIRM VIEW ── */
  .confirm {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    padding: 32px 24px;
    text-align: center;
  }
  .confirm-icon {
    width: 88px;
    height: 88px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 20px;
    font-size: 44px;
    color: #fff;
  }
  .confirm-icon.in { background: var(--orange); }
  .confirm-icon.out { background: var(--bg-dark); }
  .confirm-icon.err { background: var(--red); }
  .confirm-name {
    font-size: 28px;
    font-weight: 500;
    color: var(--text1);
    margin-bottom: 6px;
  }
  .confirm-action {
    font-size: 14px;
    color: var(--text2);
    margin-bottom: 20px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .confirm-time {
    font-size: 48px;
    font-weight: 300;
    color: var(--text1);
    letter-spacing: -1px;
  }
  .confirm-detail {
    margin-top: 16px;
    font-size: 14px;
    color: var(--text2);
  }
  .confirm-summary {
    margin-top: 14px;
    padding: 12px 20px;
    background: var(--bg2);
    border-radius: var(--rsm);
    font-size: 14px;
    color: var(--text1);
    font-weight: 500;
    max-width: 520px;
    text-align: center;
  }
  .confirm-err {
    font-size: 18px;
    color: var(--red);
    margin-top: 12px;
  }
  .lunch-prompt {
    background: var(--bg2);
    padding: 24px;
    border-radius: var(--rlg);
    margin-top: 24px;
    width: 100%;
    max-width: 420px;
  }
  .lunch-prompt-q {
    font-size: 17px;
    margin-bottom: 16px;
    color: var(--text1);
    font-weight: 500;
  }
  .lunch-prompt-note {
    font-size: 12px;
    color: var(--text3);
    margin-bottom: 16px;
  }
  .lunch-buttons {
    display: flex;
    gap: 10px;
  }
  .lunch-yes, .lunch-no {
    flex: 1;
    padding: 14px;
    border-radius: var(--rsm);
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    border: 1px solid var(--border2);
  }
  .lunch-yes { background: var(--orange); color: #fff; border-color: var(--orange); }
  .lunch-no { background: var(--bg); color: var(--text1); }
  .lunch-yes:active { background: var(--orange-d); }

  /* ── CAMERA CAPTURE VIEW ── */
  #view-camera { background: #000; }
  /* Camera view covers entire screen including header for full edge-to-edge */
  #view-camera.active {
    position: fixed;
    inset: 0;
    z-index: 100;
  }
  .camera-wrap {
    position: relative;
    width: 100%;
    height: 100%;
    overflow: hidden;
    color: #fff;
  }
  .camera-title {
    position: absolute;
    top: env(safe-area-inset-top, 0);
    left: 0; right: 0;
    z-index: 10;
    padding: 24px 24px 40px;
    font-size: clamp(20px, 3vw, 26px);
    font-weight: 400;
    letter-spacing: 0.5px;
    text-align: center;
    background: linear-gradient(to bottom, rgba(0,0,0,0.6), rgba(0,0,0,0));
    text-shadow: 0 2px 8px rgba(0,0,0,0.6);
  }
  .camera-box {
    position: absolute;
    inset: 0;
    background: #000;
    overflow: hidden;
  }
  .camera-box video,
  .camera-box img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    transform: scaleX(-1); /* mirror so it feels natural */
  }
  .camera-box img { display: none; }
  .camera-box.captured video { display: none; }
  .camera-box.captured img { display: block; }

  .camera-frame-overlay {
    position: absolute;
    inset: 0;
    border: 0 solid var(--orange);
    pointer-events: none;
    transition: border-width 0.15s;
  }
  .camera-box.captured .camera-frame-overlay {
    border-width: 8px;
  }
  .camera-box.captured::after {
    content: "✓";
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 120px; height: 120px;
    background: var(--orange);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-size: 70px;
    font-weight: 600;
    animation: popCheck 0.3s ease-out;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    z-index: 5;
  }
  @keyframes popCheck {
    0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
    60% { transform: translate(-50%, -50%) scale(1.15); opacity: 1; }
    100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
  }

  .camera-status {
    position: absolute;
    bottom: env(safe-area-inset-bottom, 0);
    left: 0; right: 0;
    z-index: 10;
    padding: 40px 24px 32px;
    font-size: 22px;
    color: rgba(255,255,255,0.95);
    letter-spacing: 0.3px;
    text-align: center;
    background: linear-gradient(to top, rgba(0,0,0,0.6), rgba(0,0,0,0));
    text-shadow: 0 2px 8px rgba(0,0,0,0.6);
    font-weight: 500;
  }
  .camera-status.captured { color: var(--orange); font-weight: 600; font-size: 26px; }

  .flash-overlay {
    position: fixed;
    inset: 0;
    background: #fff;
    opacity: 0;
    pointer-events: none;
    z-index: 9999;
    transition: opacity 0.08s;
  }
  .flash-overlay.active {
    opacity: 0.92;
    transition: opacity 0.04s;
  }
  .flash-overlay.fade {
    opacity: 0;
    transition: opacity 0.3s ease-out;
  }

  /* ── MY HOURS VIEW ── */
  .me {
    padding: 28px 24px;
    max-width: 720px;
    margin: 0 auto;
    height: 100%;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  .me-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }
  .me-name {
    font-size: 26px;
    font-weight: 500;
    color: var(--text1);
    letter-spacing: -0.5px;
  }
  .me-date { font-size: 13px; color: var(--text3); margin-top: 2px; }
  .me-close {
    padding: 10px 16px;
    font-size: 14px;
    background: var(--bg2);
    border: none;
    border-radius: var(--rsm);
    color: var(--text1);
    cursor: pointer;
    font-weight: 500;
  }
  .me-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
    margin-bottom: 20px;
  }
  /* iPad portrait and smaller: stack stat cards for legibility */
  @media (max-width: 1024px) and (orientation: portrait) {
    .me-grid { grid-template-columns: 1fr; }
  }
  @media (max-width: 680px) { .me-grid { grid-template-columns: 1fr; } }

  .me-stat {
    background: var(--bg2);
    border-radius: var(--rlg);
    padding: 22px 20px;
    position: relative;
  }
  .me-stat-label {
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--text3);
    text-transform: uppercase;
    font-weight: 600;
    margin-bottom: 10px;
  }
  .me-stat-val {
    font-size: 40px;
    font-weight: 300;
    color: var(--text1);
    letter-spacing: -1.5px;
    line-height: 1;
    font-variant-numeric: tabular-nums;
  }
  .me-stat-unit {
    font-size: 18px;
    color: var(--text3);
    font-weight: 400;
    margin-left: 4px;
  }
  .me-stat-sub {
    font-size: 13px;
    color: var(--text2);
    margin-top: 8px;
  }
  .me-stat.on { background: var(--orange-bg); }
  .me-stat.on .me-stat-val { color: var(--orange-d); }
  .me-stat.ot .me-stat-val { color: var(--orange); }
  .me-stat.warn .me-stat-sub { color: var(--orange-d); font-weight: 500; }

  .me-punches {
    background: var(--bg2);
    border-radius: var(--rlg);
    padding: 20px;
  }
  .me-punches h3 {
    font-size: 13px;
    letter-spacing: 2px;
    color: var(--text3);
    text-transform: uppercase;
    font-weight: 600;
    margin-bottom: 12px;
  }
  .me-punch-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 0;
    border-bottom: 0.5px solid var(--border);
    gap: 10px;
  }
  .me-punch-row:last-child { border-bottom: none; }
  .me-punch-day { font-size: 13px; color: var(--text2); min-width: 70px; font-weight: 500; }
  .me-punch-times { font-size: 14px; color: var(--text1); flex: 1; }
  .me-punch-hrs { font-size: 15px; font-weight: 500; color: var(--text1); font-variant-numeric: tabular-nums; }
  .me-empty {
    text-align: center;
    color: var(--text3);
    font-size: 14px;
    padding: 20px 0;
  }

  /* ── MANAGER VIEW ── */
  .mgr {
    display: flex;
    flex-direction: column;
    height: 100%;
  }
  .mgr-tabs {
    display: flex;
    border-bottom: 0.5px solid var(--border);
    padding: 0 12px;
    overflow-x: auto;
    flex-shrink: 0;
    background: var(--bg);
    scrollbar-width: none;
    -ms-overflow-style: none;
  }
  .mgr-tabs::-webkit-scrollbar { display: none; }
  .mgr-tab {
    padding: 14px 16px;
    font-size: 14px;
    font-weight: 500;
    background: none;
    border: none;
    color: var(--text2);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .mgr-tab.active {
    color: var(--text1);
    border-bottom-color: var(--orange);
  }
  .mgr-back {
    margin-left: auto;
    padding: 12px 16px;
    font-size: 13px;
    color: var(--text3);
    background: none;
    border: none;
    cursor: pointer;
    font-weight: 500;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .mgr-content {
    flex: 1;
    overflow-y: auto;
    padding: 18px;
    background: var(--bg2);
    -webkit-overflow-scrolling: touch;
  }
  @media (min-width: 834px) {
    .mgr-content { padding: 22px; }
  }

  .mgr-page { display: none; }
  .mgr-page.active { display: block; }

  .card {
    background: var(--bg);
    border-radius: var(--rlg);
    padding: 20px;
    margin-bottom: 16px;
  }
  .card h2 {
    font-size: 18px;
    font-weight: 500;
    margin-bottom: 14px;
    color: var(--text1);
  }
  .card-sub {
    font-size: 13px;
    color: var(--text2);
    margin-bottom: 14px;
  }

  .btn {
    padding: 10px 16px;
    border-radius: var(--rsm);
    font-size: 14px;
    font-weight: 500;
    border: 1px solid var(--border2);
    background: var(--bg);
    color: var(--text1);
    cursor: pointer;
  }
  .btn:active { background: var(--bg3); }
  .btn.primary { background: var(--orange); color: #fff; border-color: var(--orange); }
  .btn.primary:active { background: var(--orange-d); }
  .btn.dark { background: var(--bg-dark); color: #fff; border-color: var(--bg-dark); }
  .btn.danger { background: var(--red); color: #fff; border-color: var(--red); }
  .btn.small { padding: 6px 12px; font-size: 13px; }

  .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .row.end { justify-content: flex-end; }

  .field {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 14px;
  }
  .field label {
    font-size: 12px;
    color: var(--text2);
    letter-spacing: 0.5px;
    text-transform: uppercase;
    font-weight: 600;
  }
  .field input[type="text"], .field input[type="number"], .field input[type="date"], .field select {
    padding: 10px 12px;
    border: 1px solid var(--border2);
    border-radius: var(--rsm);
    font-size: 15px;
    background: var(--bg);
    color: var(--text1);
    font-family: inherit;
  }
  .field textarea {
    padding: 10px 12px;
    border: 1px solid var(--border2);
    border-radius: var(--rsm);
    font-size: 15px;
    resize: vertical;
    min-height: 60px;
    background: var(--bg);
    color: var(--text1);
    font-family: inherit;
  }
  .field-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }
  @media (max-width: 560px) {
    .field-row { grid-template-columns: 1fr; }
  }
  .checkbox-field {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 14px;
    background: var(--bg2);
    border-radius: var(--rsm);
    cursor: pointer;
  }
  .checkbox-field input[type="checkbox"] {
    width: 20px;
    height: 20px;
    accent-color: var(--orange);
  }
  .checkbox-field label {
    font-size: 14px;
    color: var(--text1);
    cursor: pointer;
    font-weight: 500;
  }
  .checkbox-field .hint {
    font-size: 12px;
    color: var(--text3);
    font-weight: 400;
    margin-top: 2px;
  }

  .emp-list { display: flex; flex-direction: column; gap: 8px; }
  .emp-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px;
    background: var(--bg);
    border-radius: var(--rsm);
    gap: 12px;
  }
  .emp-item-info { flex: 1; min-width: 0; }
  .emp-item-name { font-size: 15px; font-weight: 500; color: var(--text1); }
  .emp-item-meta { font-size: 12px; color: var(--text3); margin-top: 2px; }
  .emp-badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 10px;
    letter-spacing: 0.3px;
  }
  .emp-badge.ot { background: var(--orange-bg); color: var(--orange-d); }
  .emp-badge.exempt { background: var(--blue-bg); color: var(--blue); }
  .emp-badge.pto { background: var(--green-bg); color: var(--green); }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
  }
  .table-wrap {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    margin: 0 -4px;
  }
  .table-wrap table { min-width: 480px; }
  .table-wrap.wide table { min-width: 720px; }
  th {
    text-align: left;
    padding: 10px 12px;
    font-size: 11px;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-weight: 600;
    border-bottom: 1px solid var(--border);
    background: var(--bg2);
  }
  td {
    padding: 10px 12px;
    border-bottom: 0.5px solid var(--border);
    color: var(--text1);
  }
  tr:last-child td { border-bottom: none; }
  .tr-edit { cursor: pointer; }
  .tr-edit:active { background: var(--bg2); }

  .num { text-align: right; font-variant-numeric: tabular-nums; }
  .ot-num { color: var(--orange); font-weight: 500; }
  .reg-num { font-weight: 500; }

  .modal-bg {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 100;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-bg.active { display: flex; }
  .modal {
    background: var(--bg);
    border-radius: var(--rlg);
    padding: 24px;
    width: 100%;
    max-width: 500px;
    max-height: 90vh;
    overflow-y: auto;
  }
  .modal h3 {
    font-size: 18px;
    margin-bottom: 16px;
    font-weight: 500;
  }

  .toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--bg-dark);
    color: #fff;
    padding: 12px 20px;
    border-radius: var(--rsm);
    font-size: 14px;
    z-index: 200;
    opacity: 0;
    transition: opacity 0.2s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; }

  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--text3);
    font-size: 14px;
  }

  .pay-period-switcher {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .pp-btn {
    padding: 8px 14px;
    border-radius: 20px;
    font-size: 13px;
    background: var(--bg);
    border: 1px solid var(--border2);
    cursor: pointer;
    font-weight: 500;
    color: var(--text2);
  }
  .pp-btn.active {
    background: var(--text1);
    color: #fff;
    border-color: var(--text1);
  }

  .summary-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 12px;
    margin-bottom: 16px;
  }
  .summary-card {
    background: var(--bg);
    padding: 16px;
    border-radius: var(--rsm);
    text-align: center;
  }
  .summary-val {
    font-size: 26px;
    font-weight: 500;
    color: var(--text1);
    font-variant-numeric: tabular-nums;
  }
  .summary-val.ot { color: var(--orange); }
  .summary-label {
    font-size: 11px;
    color: var(--text3);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-top: 4px;
    font-weight: 600;
  }

  .punch-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 0;
    border-bottom: 0.5px solid var(--border);
    gap: 10px;
  }
  .punch-row:last-child { border-bottom: none; }
  .punch-date { font-size: 13px; color: var(--text3); min-width: 80px; }
  .punch-times { font-size: 14px; color: var(--text1); flex: 1; }
  .punch-hrs { font-size: 14px; font-weight: 500; color: var(--text1); font-variant-numeric: tabular-nums; }
  .punch-flag {
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 4px;
    background: var(--red-bg);
    color: var(--red);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }
  .punch-flag.edit { background: var(--blue-bg); color: var(--blue); }
  .punch-flag.open { background: var(--orange-bg); color: var(--orange-d); }

  /* ── PRINT ── */
  @media print {
    html, body, #app { height: auto; overflow: visible; background: #fff; }
    .header, .mgr-tabs, .mgr-back, .pay-period-switcher, .pp-btn,
    .field-row, .row, button, .mgr-btn { display: none !important; }
    .mgr-content { background: #fff; padding: 0; overflow: visible; }
    .card { box-shadow: none; border: none; padding: 0 0 16px; page-break-inside: avoid; }
    .card h2 { font-size: 16px; border-bottom: 1px solid #000; padding-bottom: 6px; }
    .card-sub { display: none; }
    table { font-size: 11px; }
    th, td { padding: 4px 6px; border: 1px solid #ccc; }
    th { background: #f0f0f0 !important; -webkit-print-color-adjust: exact; color-adjust: exact; }
    .table-wrap { overflow: visible; }
    .table-wrap table { min-width: 0; }
    .ot-num { color: #000; font-weight: bold; }
    .summary-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 12px; }
    .summary-card { border: 1px solid #ccc; padding: 8px; }
    .summary-val { font-size: 18px; }
    .summary-label { font-size: 9px; }
    .mgr-page { display: block !important; }
    .mgr-page:not(#page-reports) { display: none !important; }
    #rp-content > div { page-break-after: always; }
    #rp-content > div:last-child { page-break-after: auto; }
  }
</style>

<script>
/* ═══════════════════════════════════════════════ DATA LAYER ═══════════════════════════════════════════════ */
const STORAGE_KEY = "ezauto_timeclock_v1";

function defaultState() {
  return {
    version: 1,
    settings: {
      managerPin: "9999",
      workWeekStartDay: 6, // 0=Sun, 1=Mon, ..., 6=Sat (EZ AUTO runs Sat-Fri)
      lunchThresholdHours: 4,
      lunchDurationMinutes: 30,
      overtimeThreshold: 40,
      hoursPerPtoDay: 8, // for displaying PTO in days
      payrollEmail: "", // email(s) to send reports to; comma-separated for multiple
      companyName: "EZ AUTO"
    },
    employees: [],
    timeEntries: [],
    ptoTransactions: []
  };
}

let S = defaultState();

function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      S = Object.assign(defaultState(), parsed);
      S.settings = Object.assign(defaultState().settings, parsed.settings || {});
    }
  } catch(e) { console.warn("load failed", e); }
}

function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(S)); }
  catch(e) { console.warn("save failed", e); }
}

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }

/* ═══════════════════════════════════════════════ TIME UTILITIES ═══════════════════════════════════════════════ */
function fmtTime(d) {
  if (!d) return "—";
  const date = (d instanceof Date) ? d : new Date(d);
  let h = date.getHours(), m = date.getMinutes();
  const ap = h >= 12 ? "PM" : "AM";
  h = h % 12 || 12;
  return h + ":" + String(m).padStart(2,"0") + " " + ap;
}
function fmtDate(d) {
  const date = (d instanceof Date) ? d : new Date(d);
  return date.toLocaleDateString("en-US", { month: "short", day: "numeric" });
}
function fmtDateFull(d) {
  const date = (d instanceof Date) ? d : new Date(d);
  return date.toLocaleDateString("en-US", { weekday:"short", month:"short", day:"numeric" });
}
function fmtDateISO(d) {
  const date = (d instanceof Date) ? d : new Date(d);
  return date.toISOString().slice(0,10);
}
function fmtHrs(hrs) {
  return (Math.round(hrs * 100) / 100).toFixed(2);
}
/* Prevent Excel/Sheets formula injection: prefix a leading =, +, -, @ with apostrophe */
function csvSafe(val) {
  const s = String(val == null ? "" : val);
  if (s && /^[=+\-@]/.test(s)) return "'" + s;
  return s;
}
function parseDateLocal(str) {
  // yyyy-mm-dd -> Date at local midnight
  const [y,m,d] = str.split("-").map(Number);
  return new Date(y, m-1, d);
}

/* Returns the workweek start Date for a given date, based on settings.workWeekStartDay */
function weekStart(date) {
  const d = new Date(date);
  d.setHours(0,0,0,0);
  const dow = d.getDay();
  const start = S.settings.workWeekStartDay;
  const diff = (dow - start + 7) % 7;
  d.setDate(d.getDate() - diff);
  return d;
}
function weekEnd(date) {
  const start = weekStart(date);
  const end = new Date(start);
  end.setDate(end.getDate() + 7);
  return end;
}

/* Compute hours for an entry (in minutes), applying lunch deduction */
function entryMinutes(entry) {
  if (!entry.clockIn || !entry.clockOut) return 0;
  const inT = new Date(entry.clockIn).getTime();
  const outT = new Date(entry.clockOut).getTime();
  let mins = Math.max(0, (outT - inT) / 60000);
  if (entry.autoLunchDeducted) mins -= S.settings.lunchDurationMinutes;
  return Math.max(0, mins);
}
function entryHours(entry) { return entryMinutes(entry) / 60; }

/* ═══════════════════════════════════════════════ HOURS CALCULATION ═══════════════════════════════════════════════ */
/* For a given employee + workweek, return { regular, overtime, pto } */
function calcWeekHours(employeeId, weekStartDate) {
  const start = weekStartDate.getTime();
  const end = weekEnd(weekStartDate).getTime();

  // Sum worked hours for completed entries in this week
  let worked = 0;
  S.timeEntries.forEach(e => {
    if (e.employeeId !== employeeId) return;
    if (!e.clockIn || !e.clockOut) return;
    const t = new Date(e.clockIn).getTime();
    if (t >= start && t < end) worked += entryHours(e);
  });

  // Sum PTO hours used in this week
  let pto = 0;
  S.ptoTransactions.forEach(p => {
    if (p.employeeId !== employeeId) return;
    if (p.type !== "used") return;
    const t = parseDateLocal(p.date).getTime();
    if (t >= start && t < end) pto += p.hours;
  });

  // Apply overtime logic (only if employee is OT-eligible)
  const emp = S.employees.find(x => x.id === employeeId);
  const threshold = S.settings.overtimeThreshold;
  let reg = worked, ot = 0;
  if (emp && emp.overtimeEligible && worked > threshold) {
    ot = worked - threshold;
    reg = threshold;
  }

  return { regular: reg, overtime: ot, pto, total: reg + ot + pto, workedRaw: worked };
}

/* ═══════════════════════════════════════════════ VIEW ROUTING ═══════════════════════════════════════════════ */
function show(viewName) {
  document.querySelectorAll(".view").forEach(v => v.classList.remove("active"));
  const el = document.getElementById("view-" + viewName);
  if (el) el.classList.add("active");
  if (viewName === "kiosk") renderKiosk();
  if (viewName === "mgr") renderMgr();
}

function mgrTab(page) {
  document.querySelectorAll(".mgr-tab").forEach(t => t.classList.toggle("active", t.dataset.page === page));
  document.querySelectorAll(".mgr-page").forEach(p => p.classList.toggle("active", p.id === "page-" + page));
  renderMgrPage(page);
}

/* ═══════════════════════════════════════════════ CLOCK ═══════════════════════════════════════════════ */
function tick() {
  const now = new Date();
  let h = now.getHours(), m = now.getMinutes();
  const ap = h >= 12 ? "PM" : "AM";
  h = h % 12 || 12;
  document.getElementById("clockTime").textContent = h + ":" + String(m).padStart(2,"0") + " " + ap;
  document.getElementById("clockDate").textContent = now.toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"});

  const greetEl = document.getElementById("greetMsg");
  if (greetEl) {
    const hr = now.getHours();
    greetEl.textContent = hr < 12 ? "Good morning" : hr < 17 ? "Good afternoon" : "Good evening";
  }

  // refresh on-clock list every minute-ish
  if (document.getElementById("view-kiosk").classList.contains("active")) {
    renderOnClockList();
  }
}

/* ═══════════════════════════════════════════════ KIOSK RENDER ═══════════════════════════════════════════════ */
function renderKiosk() {
  renderOnClockList();
}

function renderOnClockList() {

/* ═══════════════════════════════════════════════ PIN PAD FLOW ═══════════════════════════════════════════════ */
let pinMode = null; // "in", "out", "mgr"
let pinBuffer = "";
let pinContext = null;

function startPunch(dir) {
  pinMode = dir;
  pinBuffer = "";
  pinContext = null;
  document.getElementById("pinTitle").textContent = dir === "in" ? "Clocking in" : "Clocking out";
  document.getElementById("pinSubtitle").textContent = "Enter your 4-digit PIN";
  updatePinDots();
  show("pin");
}
function startView() {
  pinMode = "view";
  pinBuffer = "";
  pinContext = null;
  document.getElementById("pinTitle").textContent = "View my hours";
  document.getElementById("pinSubtitle").textContent = "Enter your 4-digit PIN";
  updatePinDots();
  show("pin");
}
function startMgr() {
  pinMode = "mgr";
  pinBuffer = "";
  document.getElementById("pinTitle").textContent = "Manager access";
  document.getElementById("pinSubtitle").textContent = "Enter manager PIN";
  updatePinDots();
  show("pin");
}
function pinKey(d) {
  if (document.activeElement && document.activeElement.blur) document.activeElement.blur();
  if (pinBuffer.length >= 4) return;
  pinBuffer += d;
  updatePinDots();
  if (pinBuffer.length === 4) setTimeout(pinSubmit, 120);
}
function pinBack() {
  if (document.activeElement && document.activeElement.blur) document.activeElement.blur();
  pinBuffer = pinBuffer.slice(0, -1); updatePinDots();
}
function pinClear() {
  if (document.activeElement && document.activeElement.blur) document.activeElement.blur();
  pinBuffer = ""; updatePinDots();
}
function updatePinDots() {
  const wrap = document.getElementById("pinDots");
  wrap.classList.remove("pin-error");
  Array.from(wrap.children).forEach((d, i) => {
    d.classList.toggle("filled", i < pinBuffer.length);
  });
}
function pinError() {
  const wrap = document.getElementById("pinDots");
  wrap.classList.add("pin-error");
  setTimeout(() => { pinBuffer = ""; updatePinDots(); }, 700);
}

function pinSubmit() {
  if (pinMode === "mgr") {
    if (pinBuffer === S.settings.managerPin) {
      show("mgr");
    } else pinError();
    return;
  }
  // Employee PIN
  const emp = S.employees.find(e => e.active && e.pin === pinBuffer);
  if (!emp) { pinError(); return; }
  if (pinMode === "in") capturePhotoThen(emp, () => handleClockIn(emp));
  else if (pinMode === "out") capturePhotoThen(emp, () => handleClockOut(emp));
  else if (pinMode === "view") renderMyView(emp);
}

/* ═══════════════════════════════════════════════ CAMERA CAPTURE ═══════════════════════════════════════════════ */
/* Shows the camera feed, simulates a photo capture with a flash, then invokes the callback.
   The photo is NOT stored anywhere — it's purely a visual deterrent against buddy punching.
   If the camera is unavailable or permission is denied, skips silently to the callback. */

let cameraStream = null;
let cameraDenied = false;

function capturePhotoThen(emp, callback) {
  // If previously denied, skip immediately
  if (cameraDenied) { callback(); return; }

  // Reset camera view state
  const box = document.querySelector("#view-camera .camera-box");
  const video = document.getElementById("cameraVideo");
  const still = document.getElementById("cameraStill");
  const title = document.getElementById("cameraTitle");
  const status = document.getElementById("cameraStatus");
  const flash = document.getElementById("flashOverlay");

  box.classList.remove("captured");
  still.src = "";
  still.style.display = "none";
  video.style.display = "block";
  title.textContent = `Verifying — ${emp.name}`;
  status.textContent = "Look at the camera";
  status.classList.remove("captured");

  show("camera");

  // Attempt to start camera
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    cameraDenied = true;
    setTimeout(callback, 300);
    return;
  }

  navigator.mediaDevices.getUserMedia({
    video: { facingMode: "user", width: { ideal: 640 }, height: { ideal: 640 } },
    audio: false
  }).then(stream => {
    cameraStream = stream;
    video.srcObject = stream;

    // Show countdown so user knows when photo will be taken
    let countdown = 2;
    status.textContent = `Look at the camera — ${countdown}`;
    const countdownInterval = setInterval(() => {
      countdown--;
      if (countdown > 0) {
        status.textContent = `Look at the camera — ${countdown}`;
      } else {
        clearInterval(countdownInterval);
      }
    }, 1000);

    // After a 2-second live-preview, take a "photo"
    setTimeout(() => {
      clearInterval(countdownInterval);
      try {
        const canvas = document.createElement("canvas");
        canvas.width = video.videoWidth || 480;
        canvas.height = video.videoHeight || 480;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const dataURL = canvas.toDataURL("image/jpeg", 0.7);

        // Flash
        flash.classList.add("active");
        setTimeout(() => {
          flash.classList.remove("active");
          flash.classList.add("fade");
          setTimeout(() => flash.classList.remove("fade"), 300);
        }, 80);

        // Show captured still
        still.src = dataURL;
        still.style.display = "block";
        box.classList.add("captured");
        status.textContent = "Photo captured ✓";
        status.classList.add("captured");

        // Stop the stream — photo is never persisted
        stopCamera();

        // Display captured photo for 1.5 seconds so user can see it
        setTimeout(() => {
          callback();
        }, 1500);
      } catch(err) {
        console.warn("Capture failed:", err);
        stopCamera();
        callback();
      }
    }, 2000);
  }).catch(err => {
    console.warn("Camera denied/unavailable:", err);
    cameraDenied = true;
    status.textContent = "Camera unavailable — continuing...";
    setTimeout(() => {
      stopCamera();
      callback();
    }, 800);
  });
}

function stopCamera() {
  if (cameraStream) {
    cameraStream.getTracks().forEach(t => t.stop());
    cameraStream = null;
  }
  const video = document.getElementById("cameraVideo");
  if (video) video.srcObject = null;
}

function testCamera() {
  // Reset denied flag to allow re-test
  cameraDenied = false;
  const fakeEmp = { name: "Camera test", id: "test" };
  capturePhotoThen(fakeEmp, () => {
    toast("Camera test complete");
    show("mgr");
  });
}

/* ═══════════════════════════════════════════════ CLOCK IN / OUT LOGIC ═══════════════════════════════════════════════ */
function handleClockIn(emp) {
  // Check if already clocked in
  const open = S.timeEntries.find(e => e.employeeId === emp.id && e.clockIn && !e.clockOut);
  if (open) {
    showConfirm({
      type: "err",
      name: emp.name,
      action: "already clocked in",
      time: fmtTime(open.clockIn),
      detail: "You already clocked in at " + fmtTime(open.clockIn) + ". Tap CLOCK OUT instead."
    });
    return;
  }
  // Prevent accidental double-punch: if they clocked out in last 30 seconds, probably a mistake
  const recent = S.timeEntries
    .filter(e => e.employeeId === emp.id && e.clockOut)
    .sort((a,b) => new Date(b.clockOut) - new Date(a.clockOut))[0];
  if (recent && (Date.now() - new Date(recent.clockOut).getTime()) < 30000) {
    showConfirm({
      type: "err",
      name: emp.name,
      action: "too soon",
      time: "",
      detail: "You just clocked out a moment ago. Wait 30 seconds before clocking back in."
    });
    setTimeout(() => show("kiosk"), 3000);
    return;
  }
  const now = new Date();
  const entry = {
    id: uid(),
    employeeId: emp.id,
    clockIn: now.toISOString(),
    clockOut: null,
    autoLunchDeducted: false,
    lunchTaken: null,
    editedByManager: false,
    editNote: ""
  };
  S.timeEntries.push(entry);
  save();

  // Show week context
  const w = calcWeekHours(emp.id, weekStart(now));
  const weekSoFar = w.workedRaw;
  const threshold = S.settings.overtimeThreshold;
  const ptoDays = (emp.ptoBalanceHours || 0) / (S.settings.hoursPerPtoDay || 8);

  let detail = `Week so far: ${fmtHrs(weekSoFar)} hrs`;
  if (emp.overtimeEligible && weekSoFar >= threshold) {
    detail += ` (incl. ${fmtHrs(weekSoFar - threshold)} OT)`;
  } else if (emp.overtimeEligible && weekSoFar >= threshold - 8) {
    detail += ` • ${fmtHrs(threshold - weekSoFar)} until OT`;
  }
  detail += ` • PTO: ${ptoDays.toFixed(1)} days`;

  showConfirm({
    type: "in",
    name: emp.name,
    action: "Clocked in",
    time: fmtTime(now),
    detail
  });
  setTimeout(() => show("kiosk"), 3500);
}

function handleClockOut(emp) {
  const open = S.timeEntries.find(e => e.employeeId === emp.id && e.clockIn && !e.clockOut);
  if (!open) {
    showConfirm({
      type: "err",
      name: emp.name,
      action: "not clocked in",
      time: "",
      detail: "No active shift found. Tap CLOCK IN first."
    });
    return;
  }
  // Prevent accidental double-punch: if they clocked in less than 30 seconds ago, probably a mistake
  const sinceIn = Date.now() - new Date(open.clockIn).getTime();
  if (sinceIn < 30000) {
    showConfirm({
      type: "err",
      name: emp.name,
      action: "too soon",
      time: "",
      detail: "You just clocked in a moment ago. Wait at least 30 seconds before clocking out."
    });
    setTimeout(() => show("kiosk"), 3000);
    return;
  }
  const now = new Date();
  open.clockOut = now.toISOString();
  const rawHrs = (now.getTime() - new Date(open.clockIn).getTime()) / 3600000;

  // Auto-deduct lunch if shift exceeds threshold
  const deducted = rawHrs > S.settings.lunchThresholdHours;
  open.autoLunchDeducted = deducted;
  open.lunchTaken = deducted ? true : null;
  save();

  const finalHrs = entryHours(open);
  const summary = buildClockOutSummary(emp, open);
  showConfirm({
    type: "out",
    name: emp.name,
    action: "Clocked out",
    time: fmtTime(now),
    detail: deducted
      ? `Shift: ${fmtHrs(rawHrs)} hrs — ${S.settings.lunchDurationMinutes} min lunch deducted = ${fmtHrs(finalHrs)} hrs paid`
      : `Shift: ${fmtHrs(rawHrs)} hrs (under ${S.settings.lunchThresholdHours} hrs — no lunch deduction)`,
    summary
  });
  setTimeout(() => show("kiosk"), 4500);
}

/* Build summary line showing daily total, weekly total, OT warning, and PTO */
function buildClockOutSummary(emp, entry) {
  const entryDate = new Date(entry.clockIn);
  const dayStart = new Date(entryDate); dayStart.setHours(0,0,0,0);
  const dayEnd = new Date(dayStart); dayEnd.setDate(dayEnd.getDate()+1);

  // Day total (all completed entries today)
  let dayHrs = 0;
  S.timeEntries.forEach(e => {
    if (e.employeeId !== emp.id || !e.clockIn || !e.clockOut) return;
    const t = new Date(e.clockIn).getTime();
    if (t >= dayStart.getTime() && t < dayEnd.getTime()) dayHrs += entryHours(e);
  });

  // Week total
  const w = calcWeekHours(emp.id, weekStart(entryDate));
  const weekWorked = w.workedRaw;
  const threshold = S.settings.overtimeThreshold;
  const ptoDays = (emp.ptoBalanceHours || 0) / (S.settings.hoursPerPtoDay || 8);

  let otNote = "";
  if (emp.overtimeEligible) {
    if (weekWorked > threshold) otNote = ` (${fmtHrs(weekWorked - threshold)} OT)`;
    else if (weekWorked >= threshold - 8) otNote = ` • ${fmtHrs(threshold - weekWorked)} to OT`;
  }

  return `Today: ${fmtHrs(dayHrs)} hrs  •  Week: ${fmtHrs(weekWorked)} hrs${otNote}  •  PTO: ${ptoDays.toFixed(1)} days`;
}

/* ═══════════════════════════════════════════════ CONFIRM VIEW ═══════════════════════════════════════════════ */
function showConfirm(data) {
  const iconMap = { in: "✓", out: "✓", err: "!" };
  const body = document.getElementById("confirmBody");
  let html = `
    <div class="confirm-icon ${data.type}">${iconMap[data.type] || "!"}</div>
    <div class="confirm-name">${escapeHTML(data.name || "")}</div>
    <div class="confirm-action">${escapeHTML(data.action || "")}</div>
  `;
  if (data.time) html += `<div class="confirm-time">${escapeHTML(data.time)}</div>`;
  if (data.detail) html += `<div class="confirm-detail">${escapeHTML(data.detail)}</div>`;
  if (data.summary) html += `<div class="confirm-summary">${escapeHTML(data.summary)}</div>`;
  body.innerHTML = html;
  show("confirm");
}

function escapeHTML(s) {
  return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

/* ═══════════════════════════════════════════════ MY HOURS VIEW ═══════════════════════════════════════════════ */
function renderMyView(emp) {
  const now = new Date();
  const todayStart = new Date(now); todayStart.setHours(0,0,0,0);
  const todayEnd = new Date(todayStart); todayEnd.setDate(todayEnd.getDate()+1);
  const wkStart = weekStart(now);

  // Today's hours (completed shifts + current open shift running total)
  let todayHrs = 0;
  let currentShift = null;
  let todayEntries = [];
  S.timeEntries.forEach(e => {
    if (e.employeeId !== emp.id || !e.clockIn) return;
    const t = new Date(e.clockIn).getTime();
    if (t >= todayStart.getTime() && t < todayEnd.getTime()) {
      todayEntries.push(e);
      if (e.clockOut) {
        todayHrs += entryHours(e);
      } else {
        // Running: include time-so-far
        currentShift = e;
        todayHrs += Math.max(0, (now.getTime() - new Date(e.clockIn).getTime()) / 3600000);
      }
    }
  });
  todayEntries.sort((a,b) => new Date(a.clockIn) - new Date(b.clockIn));

  // This week's hours (completed + running)
  const w = calcWeekHours(emp.id, wkStart);
  let weekWorked = w.workedRaw; // completed work this week
  if (currentShift) {
    // Add running time from currentShift only if it's in this week (always true since today ∈ this week)
    weekWorked += Math.max(0, (now.getTime() - new Date(currentShift.clockIn).getTime()) / 3600000);
  }

  const threshold = S.settings.overtimeThreshold;
  const eligible = !!emp.overtimeEligible;
  let weekReg = weekWorked, weekOT = 0;
  if (eligible && weekWorked > threshold) {
    weekOT = weekWorked - threshold;
    weekReg = threshold;
  }

  // OT status
  let otClass = "", otSub = "";
  if (eligible) {
    if (weekWorked >= threshold) {
      otClass = "ot";
      otSub = `${fmtHrs(weekOT)} hrs overtime`;
    } else if (weekWorked >= threshold - 8) {
      otClass = "warn";
      otSub = `${fmtHrs(threshold - weekWorked)} hrs until overtime`;
    } else {
      otSub = `${fmtHrs(threshold - weekWorked)} hrs until overtime`;
    }
  } else {
    otSub = "Salaried — no overtime";
  }

  // Punches this week (completed)
  const weekEnd_ = weekEnd(now);
  const weekPunches = S.timeEntries
    .filter(e => e.employeeId === emp.id && e.clockIn)
    .filter(e => {
      const t = new Date(e.clockIn).getTime();
      return t >= wkStart.getTime() && t < weekEnd_.getTime();
    })
    .sort((a,b) => new Date(b.clockIn) - new Date(a.clockIn));

  // PTO in days
  const ptoHrs = emp.ptoBalanceHours || 0;
  const perDay = S.settings.hoursPerPtoDay || 8;
  const ptoDays = ptoHrs / perDay;

  const dayLabels = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

  const body = document.getElementById("meBody");
  body.innerHTML = `
    <div class="me-header">
      <div>
        <div class="me-name">${escapeHTML(emp.name)}</div>
        <div class="me-date">${now.toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"})}</div>
      </div>
      <button class="me-close" onclick="show('kiosk')">Done</button>
    </div>

    <div class="me-grid">
      <div class="me-stat ${currentShift ? 'on' : ''}">
        <div class="me-stat-label">Today</div>
        <div class="me-stat-val">${fmtHrs(todayHrs)}<span class="me-stat-unit">hrs</span></div>
        <div class="me-stat-sub">
          ${currentShift ? `On the clock since ${fmtTime(currentShift.clockIn)}` : todayHrs > 0 ? `Shift complete` : `Not clocked in yet`}
        </div>
      </div>
      <div class="me-stat ${otClass}">
        <div class="me-stat-label">This week</div>
        <div class="me-stat-val">${fmtHrs(weekWorked)}<span class="me-stat-unit">hrs</span></div>
        <div class="me-stat-sub">${otSub}</div>
      </div>
      <div class="me-stat">
        <div class="me-stat-label">PTO balance</div>
        <div class="me-stat-val">${ptoDays.toFixed(1)}<span class="me-stat-unit">days</span></div>
        <div class="me-stat-sub">${fmtHrs(ptoHrs)} hours available</div>
      </div>
    </div>

    <div class="me-punches">
      <h3>This week's shifts (${dayLabels[S.settings.workWeekStartDay]}–${dayLabels[(S.settings.workWeekStartDay+6)%7]})</h3>
      ${weekPunches.length === 0 ? '<div class="me-empty">No shifts this week yet.</div>' : weekPunches.map(e => {
        const d = new Date(e.clockIn);
        const isOpen = !e.clockOut;
        const hrs = isOpen
          ? Math.max(0, (now.getTime() - d.getTime()) / 3600000)
          : entryHours(e);
        return `<div class="me-punch-row">
          <div class="me-punch-day">${dayLabels[d.getDay()]} ${d.getMonth()+1}/${d.getDate()}</div>
          <div class="me-punch-times">
            ${fmtTime(e.clockIn)} → ${isOpen ? '<span style="color:var(--orange);font-weight:500;">running</span>' : fmtTime(e.clockOut)}
            ${e.autoLunchDeducted ? ' <span class="emp-badge">−30m lunch</span>' : ''}
            ${e.lunchTaken === false ? ' <span class="punch-flag">No lunch</span>' : ''}
          </div>
          <div class="me-punch-hrs">${fmtHrs(hrs)} hrs</div>
        </div>`;
      }).join("")}
    </div>
  `;
  show("me");
}

function forceClockOut(entryId) {
  const e = S.timeEntries.find(x => x.id === entryId);
  if (!e) return;
  const emp = S.employees.find(x => x.id === e.employeeId);
  const inDate = new Date(e.clockIn);

  // Default suggestion: 8 hours after clock-in (typical shift)
  const suggestedOut = new Date(inDate.getTime() + 8 * 3600000);
  function dtForInput(d) {
    const pad = n => String(n).padStart(2,"0");
    return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate())+"T"+pad(d.getHours())+":"+pad(d.getMinutes());
  }

  openModal(`
    <h3>Force clock out — ${escapeHTML(emp ? emp.name : "")}</h3>
    <div class="card-sub">
      Clocked in: <b>${fmtDateFull(inDate)} at ${fmtTime(inDate)}</b><br>
      Enter when they actually finished working. Don't just use "now" if they forgot to clock out earlier — that would pay them for time they weren't working.
    </div>
    <div class="field">
      <label>Actual clock out time</label>
      <input type="datetime-local" id="fco-time" value="${dtForInput(suggestedOut)}">
    </div>
    <div class="field">
      <label>Reason (optional)</label>
      <textarea id="fco-note" placeholder="e.g. Forgot to clock out, phone died, etc."></textarea>
    </div>
    <div class="row end">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn primary" onclick="forceClockOutSave('${entryId}')">Force clock out</button>
    </div>
  `);
}

function forceClockOutSave(entryId) {
  const e = S.timeEntries.find(x => x.id === entryId);
  if (!e) return;
  const val = document.getElementById("fco-time").value;
  if (!val) { toast("Pick a clock-out time"); return; }
  const outD = new Date(val);
  const inD = new Date(e.clockIn);
  if (outD <= inD) { toast("Clock out must be after clock in"); return; }
  const hrs = (outD - inD) / 3600000;
  if (hrs > 24) {
    if (!confirm(`That's a ${fmtHrs(hrs)}-hour shift. Are you sure?`)) return;
  }
  e.clockOut = outD.toISOString();
  // Auto-apply lunch deduction if shift qualifies
  if (hrs > S.settings.lunchThresholdHours) {
    e.autoLunchDeducted = true;
    e.lunchTaken = true;
  }
  e.editedByManager = true;
  const note = document.getElementById("fco-note").value.trim();
  e.editNote = (e.editNote || "") + " [Manager force clock-out" + (note ? ": " + note : "") + "]";
  save();
  closeModal();
  toast("Clocked out at " + fmtTime(outD));
  renderToday();
}

/* ═══════════════════════════════════════════════ MANAGER: EMPLOYEES ═══════════════════════════════════════════════ */

function empEdit(id) {
  const isNew = !id;
  const emp = isNew
    ? { id: uid(), name: "", pin: "", overtimeEligible: true, ptoBalanceHours: 0, active: true }
    : Object.assign({}, S.employees.find(x => x.id === id));
  if (!emp) return;

  openModal(`
    <h3>${isNew ? "Add employee" : "Edit employee"}</h3>
    <div class="field">
      <label>Full name</label>
      <input type="text" id="emp-name" value="${escapeHTML(emp.name)}" placeholder="e.g. Sonia Torres">
    </div>
    <div class="field-row">
      <div class="field">
        <label>4-digit PIN</label>
        <input type="text" id="emp-pin" value="${escapeHTML(emp.pin)}" maxlength="4" inputmode="numeric" placeholder="1234">
      </div>
      <div class="field">
        <label>Starting PTO (hours)</label>
        <input type="number" id="emp-pto" value="${emp.ptoBalanceHours || 0}" min="0" step="0.5">
      </div>
    </div>
    <div class="checkbox-field" onclick="document.getElementById('emp-ot').click()">
      <input type="checkbox" id="emp-ot" ${emp.overtimeEligible ? "checked" : ""}>
      <label style="flex:1;">
        Earns overtime (1.5× after 40 hrs/week)
        <div class="hint">Check for hourly employees. Uncheck for salaried/exempt managers.</div>
      </label>
    </div>
    ${!isNew ? `
      <div class="checkbox-field" onclick="document.getElementById('emp-active').click()" style="margin-top:8px;">
        <input type="checkbox" id="emp-active" ${emp.active ? "checked" : ""}>
        <label style="flex:1;">Active <div class="hint">Uncheck to deactivate without losing history.</div></label>
      </div>
    ` : ""}
    <div class="row end" style="margin-top:20px;">
      ${!isNew ? `<button class="btn danger" onclick="empDelete('${emp.id}')">Delete</button>` : ""}
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn primary" onclick="empSave('${emp.id}', ${isNew})">Save</button>
    </div>
  `);
}

function empSave(id, isNew) {
  const name = document.getElementById("emp-name").value.trim();
  const pin = document.getElementById("emp-pin").value.trim();
  const pto = parseFloat(document.getElementById("emp-pto").value) || 0;
  const ot = document.getElementById("emp-ot").checked;
  const active = isNew ? true : document.getElementById("emp-active").checked;

  if (!name) { toast("Name is required"); return; }
  if (!/^\d{4}$/.test(pin)) { toast("PIN must be 4 digits"); return; }

  // Check PIN uniqueness among active
  const dup = S.employees.find(e => e.id !== id && e.active && e.pin === pin);
  if (dup) { toast(`PIN already used by ${dup.name}`); return; }

  if (isNew) {
    S.employees.push({ id, name, pin, overtimeEligible: ot, ptoBalanceHours: pto, active: true });
  } else {
    const emp = S.employees.find(x => x.id === id);
    emp.name = name; emp.pin = pin;
    emp.overtimeEligible = ot;
    emp.ptoBalanceHours = pto;
    emp.active = active;
  }
  save();
  closeModal();
  renderEmps();
  toast(isNew ? "Employee added" : "Employee updated");
}

function empDelete(id) {
  if (!confirm("Delete this employee? Their time history will remain but they'll no longer appear. To keep history cleaner, consider 'Active: off' instead.")) return;
  S.employees = S.employees.filter(e => e.id !== id);
  save();
  closeModal();
  renderEmps();
  toast("Employee removed");
}

/* ═══════════════════════════════════════════════ MANAGER: PTO ═══════════════════════════════════════════════ */

function ptoAssign(empId) {
  const emp = S.employees.find(x => x.id === empId);
  const perDay = S.settings.hoursPerPtoDay || 8;
  openModal(`
    <h3>Assign PTO — ${escapeHTML(emp.name)}</h3>
    <div class="card-sub">Current balance: <b>${((emp.ptoBalanceHours||0)/perDay).toFixed(1)} days</b> (${fmtHrs(emp.ptoBalanceHours||0)} hrs)</div>
    <div class="field-row">
      <div class="field">
        <label>Hours to add</label>
        <input type="number" id="pto-hrs" value="${perDay}" min="0" step="0.5" oninput="ptoSyncDays(${perDay})">
        <div id="pto-days-hint" style="font-size:12px;color:var(--text3);margin-top:4px;">= 1.0 days</div>
      </div>
      <div class="field">
        <label>Or enter days</label>
        <input type="number" id="pto-days" value="1" min="0" step="0.5" oninput="ptoSyncHours(${perDay})">

      </div>

    <div class="field">
      <label>Note (optional)</label>
      <textarea id="pto-note" placeholder="e.g. Q1 accrual, anniversary bonus, etc."></textarea>
    </div>

      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn primary" onclick="ptoAssignSave('${empId}')">Assign</button>

}

function ptoSyncDays(perDay) {
  const hrs = parseFloat(document.getElementById("pto-hrs").value) || 0;
  const daysInput = document.getElementById("pto-days");
  const hint = document.getElementById("pto-days-hint");
  if (daysInput) daysInput.value = (hrs / perDay).toFixed(2).replace(/\.?0+$/,"");
  if (hint) hint.textContent = `= ${(hrs/perDay).toFixed(1)} days`;
}
function ptoSyncHours(perDay) {
  const days = parseFloat(document.getElementById("pto-days").value) || 0;
  const hrsInput = document.getElementById("pto-hrs");
  const hint = document.getElementById("pto-days-hint");
  const hrs = days * perDay;
  if (hrsInput) hrsInput.value = hrs.toFixed(2).replace(/\.?0+$/,"");
  if (hint) hint.textContent = `= ${days.toFixed(1)} days`;
}

function ptoAssignSave(empId) {
  const hrs = parseFloat(document.getElementById("pto-hrs").value);
  const note = document.getElementById("pto-note").value.trim();
  if (!hrs || hrs <= 0) { toast("Enter a positive number"); return; }
  const emp = S.employees.find(x => x.id === empId);
  emp.ptoBalanceHours = (emp.ptoBalanceHours || 0) + hrs;
  S.ptoTransactions.push({
    id: uid(), employeeId: empId, date: fmtDateISO(new Date()),
    hours: hrs, type: "assigned", note, at: new Date().toISOString()
  });
  save();
  closeModal();
  renderPTO();
  toast(`Added ${fmtHrs(hrs)} PTO hrs to ${emp.name}`);
}

function ptoRecord(empId) {

  const perDay = S.settings.hoursPerPtoDay || 8;
  openModal(`

      </div>
      <div class="field">
        <label>Or enter days</label>
        <input type="number" id="pto-days" value="1" min="0" step="0.5" oninput="ptoSyncHours(${perDay})">
        <div style="font-size:12px;color:var(--text3);margin-top:4px;">1 day = ${perDay} hrs</div>
      </div>
    </div>
    <div class="field-row">
      <div class="field">
        <label>Date taken</label>
        <input type="date" id="pto-date" value="${fmtDateISO(new Date())}">

      <div class="field">
        <label>Type</label>
        <select id="pto-type">

          <option value="Sick">Sick</option>

function ptoRecordSave(empId) {
  const hrs = parseFloat(document.getElementById("pto-hrs").value);
  const date = document.getElementById("pto-date").value;
  const type = document.getElementById("pto-type").value;
  const note = document.getElementById("pto-note").value.trim();
  if (!hrs || hrs <= 0) { toast("Enter a positive number"); return; }
  if (!date) { toast("Pick a date"); return; }
  const emp = S.employees.find(x => x.id === empId);
  if ((emp.ptoBalanceHours || 0) < hrs) {
    if (!confirm(`${emp.name} only has ${fmtHrs(emp.ptoBalanceHours||0)} PTO hrs available. Record anyway (creates negative balance)?`)) return;
  }
  emp.ptoBalanceHours = (emp.ptoBalanceHours || 0) - hrs;
  S.ptoTransactions.push({
    id: uid(), employeeId: empId, date,
    hours: hrs, type: "used", subtype: type, note, at: new Date().toISOString()
  });
  save();
  closeModal();
  renderPTO();
  toast(`Recorded ${fmtHrs(hrs)} ${type} hrs for ${emp.name}`);
}

function ptoHistory(empId) {
  const emp = S.employees.find(x => x.id === empId);
  const hist = S.ptoTransactions.filter(p => p.employeeId === empId).sort((a,b) => (b.at||"").localeCompare(a.at||""));
  openModal(`
    <h3>PTO history — ${escapeHTML(emp.name)}</h3>
    <div class="card-sub">Current balance: <b>${fmtHrs(emp.ptoBalanceHours||0)} hrs</b></div>

              <td>${h.type === "assigned" ? "+" : "−"}</td>

/* ═══════════════════════════════════════════════ MANAGER: TIMESHEET ═══════════════════════════════════════════════ */
let tsEmp = null;
let tsStart = null;

function renderTimesheet() {
  const page = document.getElementById("page-timesheet");
  const active = S.employees.filter(e => e.active);
  if (!tsEmp && active.length > 0) tsEmp = active[0].id;
  if (!tsStart) tsStart = fmtDateISO(weekStart(new Date()));

  const emp = S.employees.find(e => e.id === tsEmp);
  const start = parseDateLocal(tsStart);
  const end = new Date(start); end.setDate(end.getDate() + 7);

  const entries = S.timeEntries
    .filter(e => e.employeeId === tsEmp && e.clockIn)
    .filter(e => {
      const t = new Date(e.clockIn).getTime();
      return t >= start.getTime() && t < end.getTime();
    })
    .sort((a,b) => new Date(a.clockIn) - new Date(b.clockIn));

  const hrs = calcWeekHours(tsEmp, start);

  page.innerHTML = `
    <div class="card">
      <div class="field-row">
        <div class="field">
          <label>Employee</label>
          <select id="ts-emp" onchange="tsChangeEmp(this.value)">
            ${active.map(e => `<option value="${e.id}" ${e.id===tsEmp?"selected":""}>${escapeHTML(e.name)}</option>`).join("")}
          </select>
        </div>
        <div class="field">
          <label>Week starting</label>
          <input type="date" id="ts-start" value="${tsStart}" onchange="tsChangeStart(this.value)">
        </div>
      </div>
      <div class="row">
        <button class="btn small" onclick="tsShift(-7)">← Prev week</button>
        <button class="btn small" onclick="tsShift(7)">Next week →</button>
        <button class="btn small" onclick="tsThisWeek()">This week</button>
        <button class="btn small" onclick="tsAddPunch()" style="margin-left:auto;">+ Punch</button>
        <button class="btn small primary" onclick="tsAddPTODay()">+ PTO day</button>
      </div>
    </div>

    <div class="card">
      <h2>Summary — ${escapeHTML(emp ? emp.name : "")}</h2>
      <div class="summary-grid">
        <div class="summary-card">
          <div class="summary-val">${fmtHrs(hrs.regular)}</div>
          <div class="summary-label">Regular</div>
        </div>
        <div class="summary-card">
          <div class="summary-val ot">${fmtHrs(hrs.overtime)}</div>
          <div class="summary-label">Overtime ${emp && !emp.overtimeEligible ? "(exempt)" : ""}</div>
        </div>
        <div class="summary-card">
          <div class="summary-val">${fmtHrs(hrs.pto)}</div>
          <div class="summary-label">PTO</div>
        </div>
        <div class="summary-card">
          <div class="summary-val">${fmtHrs(hrs.total)}</div>
          <div class="summary-label">Total paid</div>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>Punches (${fmtDate(start)} – ${fmtDate(new Date(end.getTime()-86400000))})</h2>
      ${entries.length === 0 ? '<div class="empty-state">No punches this week.</div>' : `
        <div>
          ${entries.map(e => {
            const isOpen = !e.clockOut;
            return `
              <div class="punch-row" onclick="tsEditPunch('${e.id}')" style="cursor:pointer;">
                <div class="punch-date">${fmtDate(e.clockIn)}</div>
                <div class="punch-times">
                  ${fmtTime(e.clockIn)} → ${e.clockOut ? fmtTime(e.clockOut) : '<span class="punch-flag open">OPEN</span>'}
                  ${e.lunchTaken === false ? ' <span class="punch-flag">No lunch</span>' : ''}
                  ${e.autoLunchDeducted ? ' <span class="emp-badge">−30m</span>' : ''}
                  ${e.editedByManager ? ' <span class="punch-flag edit">Edited</span>' : ''}
                </div>
                <div class="punch-hrs">${isOpen ? "—" : fmtHrs(entryHours(e)) + " hrs"}</div>
              </div>
            `;
          }).join("")}
        </div>
      `}
    </div>

    <div class="card">
      <h2>PTO this week</h2>
      ${(() => {
        const weekPTO = S.ptoTransactions.filter(p =>
          p.employeeId === tsEmp && p.type === "used" &&
          parseDateLocal(p.date).getTime() >= start.getTime() &&
          parseDateLocal(p.date).getTime() < end.getTime()
        ).sort((a,b) => a.date.localeCompare(b.date));
        if (weekPTO.length === 0) return '<div class="empty-state">No PTO used this week.</div>';
        return `<div>${weekPTO.map(p => `
          <div class="punch-row">
            <div class="punch-date">${fmtDate(p.date)}</div>
            <div class="punch-times">
              <span class="emp-badge pto">${escapeHTML(p.subtype || "PTO")}</span>
              ${p.note ? ` <span style="color:var(--text3);font-size:12px;">${escapeHTML(p.note)}</span>` : ''}
            </div>
            <div class="punch-hrs">${fmtHrs(p.hours)} hrs</div>
            <button class="btn small" onclick="tsDeletePTO('${p.id}')" style="margin-left:8px;">Remove</button>
          </div>
        `).join("")}</div>`;
      })()}
    </div>
  `;
}

function tsAddPTODay() {
  const emp = S.employees.find(x => x.id === tsEmp);
  if (!emp) { toast("Select an employee first"); return; }
  const perDay = S.settings.hoursPerPtoDay || 8;
  // Pre-fill date with the week being viewed (first day of it)
  const defaultDate = tsStart || fmtDateISO(new Date());

  openModal(`
    <h3>Add PTO day — ${escapeHTML(emp.name)}</h3>
    <div class="card-sub">Current balance: <b>${((emp.ptoBalanceHours||0)/perDay).toFixed(1)} days</b> (${fmtHrs(emp.ptoBalanceHours||0)} hrs)</div>
    <div class="field-row">
      <div class="field">
        <label>Date</label>
        <input type="date" id="pto-date" value="${defaultDate}">
      </div>
      <div class="field">
        <label>Type</label>
        <select id="pto-type">
          <option value="Vacation">Vacation</option>
          <option value="Sick">Sick</option>
          <option value="Personal">Personal</option>
          <option value="Holiday">Holiday</option>
          <option value="Other">Other</option>
        </select>
      </div>
    </div>
    <div class="field-row">
      <div class="field">
        <label>Hours</label>
        <input type="number" id="pto-hrs" value="${perDay}" min="0" step="0.5" oninput="ptoSyncDays(${perDay})">
        <div id="pto-days-hint" style="font-size:12px;color:var(--text3);margin-top:4px;">= 1.0 days</div>
      </div>
      <div class="field">
        <label>Or days</label>
        <input type="number" id="pto-days" value="1" min="0" step="0.5" oninput="ptoSyncHours(${perDay})">
        <div style="font-size:12px;color:var(--text3);margin-top:4px;">1 day = ${perDay} hrs</div>
      </div>
    </div>
    <div class="field">
      <label>Note (optional)</label>
      <textarea id="pto-note" placeholder="e.g. Called in sick, vacation day..."></textarea>
    </div>
    <div class="row end">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn primary" onclick="ptoRecordSave('${tsEmp}'); setTimeout(renderTimesheet, 100);">Add</button>
    </div>
  `);
}

function tsDeletePTO(ptoId) {
  const p = S.ptoTransactions.find(x => x.id === ptoId);
  if (!p) return;
  if (!confirm(`Remove this ${p.subtype || "PTO"} day (${fmtHrs(p.hours)} hrs on ${fmtDate(p.date)})? This will restore the PTO to the employee's balance.`)) return;
  const emp = S.employees.find(x => x.id === p.employeeId);
  if (emp) emp.ptoBalanceHours = (emp.ptoBalanceHours || 0) + p.hours;
  S.ptoTransactions = S.ptoTransactions.filter(x => x.id !== ptoId);
  save();
  renderTimesheet();
  toast("PTO day removed, balance restored");
}

function tsChangeEmp(id) { tsEmp = id; renderTimesheet(); }
function tsChangeStart(v) { tsStart = v; renderTimesheet(); }
function tsShift(days) {
  const d = parseDateLocal(tsStart); d.setDate(d.getDate()+days);
  tsStart = fmtDateISO(d); renderTimesheet();
}
function tsThisWeek() { tsStart = fmtDateISO(weekStart(new Date())); renderTimesheet(); }

function tsEditPunch(entryId) {
  const e = S.timeEntries.find(x => x.id === entryId);
  if (!e) return;
  const inDate = e.clockIn ? new Date(e.clockIn) : new Date();
  const outDate = e.clockOut ? new Date(e.clockOut) : null;

  function dtForInput(d) {
    if (!d) return "";
    const pad = n => String(n).padStart(2,"0");
    return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate())+"T"+pad(d.getHours())+":"+pad(d.getMinutes());
  }

  openModal(`
    <h3>Edit punch</h3>
    <div class="field-row">
      <div class="field">
        <label>Clock in</label>
        <input type="datetime-local" id="p-in" value="${dtForInput(inDate)}">
      </div>
      <div class="field">
        <label>Clock out</label>
        <input type="datetime-local" id="p-out" value="${dtForInput(outDate)}">
      </div>
    </div>
    <div class="checkbox-field" onclick="document.getElementById('p-lunch').click()">
      <input type="checkbox" id="p-lunch" ${e.autoLunchDeducted ? "checked" : ""}>
      <label style="flex:1;">Deduct 30 min lunch<div class="hint">Check if the employee took a full uninterrupted lunch break.</div></label>
    </div>
    <div class="field" style="margin-top:12px;">
      <label>Edit note</label>
      <textarea id="p-note" placeholder="e.g. Forgot to clock out, system went down...">${escapeHTML(e.editNote||"")}</textarea>
    </div>
    <div class="row end">
      <button class="btn danger" onclick="tsDeletePunch('${e.id}')">Delete</button>
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn primary" onclick="tsSavePunch('${e.id}')">Save</button>
    </div>
  `);
}

function tsAddPunch() {
  const newId = uid();
  const now = new Date();
  const ent = {
    id: newId, employeeId: tsEmp,
    clockIn: now.toISOString(), clockOut: null,
    autoLunchDeducted: false, lunchTaken: null,
    editedByManager: true, editNote: "Manually added by manager"
  };
  S.timeEntries.push(ent);
  save();
  tsEditPunch(newId);
}

function tsSavePunch(entryId) {
  const e = S.timeEntries.find(x => x.id === entryId);
  if (!e) return;
  const inVal = document.getElementById("p-in").value;
  const outVal = document.getElementById("p-out").value;
  if (!inVal) { toast("Clock in required"); return; }
  const inD = new Date(inVal);
  const outD = outVal ? new Date(outVal) : null;
  if (outD && outD <= inD) { toast("Clock out must be after clock in"); return; }
  e.clockIn = inD.toISOString();
  e.clockOut = outD ? outD.toISOString() : null;
  e.autoLunchDeducted = document.getElementById("p-lunch").checked;
  e.editNote = document.getElementById("p-note").value.trim();
  e.editedByManager = true;
  save();
  closeModal();
  renderTimesheet();
  toast("Punch saved");
}

function tsDeletePunch(entryId) {
  if (!confirm("Delete this punch? This cannot be undone.")) return;
  S.timeEntries = S.timeEntries.filter(x => x.id !== entryId);
  save();
  closeModal();
  renderTimesheet();
  toast("Punch deleted");
}

/* ═══════════════════════════════════════════════ MANAGER: REPORTS ═══════════════════════════════════════════════ */

let rpView = "summary"; // "summary" or "detail"

function rpSetView(v) { rpView = v; renderReports(); }

function rpRender() {
  const len = parseInt(document.getElementById("rp-len").value);
  const start = parseDateLocal(rpStart);
  const weeksToInclude = len / 7;

  if (rpView === "summary") {
    rpRenderSummary(start, weeksToInclude);
  } else {
    rpRenderDetail(start, weeksToInclude);
  }
}

function rpRenderSummary(start, weeksToInclude) {
  const rows = S.employees.filter(e => e.active).map(emp => {
    let regular = 0, overtime = 0, pto = 0;
    for (let i = 0; i < weeksToInclude; i++) {
      const wStart = new Date(start); wStart.setDate(wStart.getDate() + i*7);
      const h = calcWeekHours(emp.id, wStart);
      regular += h.regular; overtime += h.overtime; pto += h.pto;
    }
    return { emp, regular, overtime, pto, total: regular+overtime+pto };
  });

  const totals = rows.reduce((a,r) => ({
    regular: a.regular + r.regular, overtime: a.overtime + r.overtime,
    pto: a.pto + r.pto, total: a.total + r.total
  }), { regular:0, overtime:0, pto:0, total:0 });

  const html = `
    <div class="summary-grid">
      <div class="summary-card">
        <div class="summary-val">${fmtHrs(totals.regular)}</div>
        <div class="summary-label">Reg hrs</div>
      </div>
      <div class="summary-card">
        <div class="summary-val ot">${fmtHrs(totals.overtime)}</div>
        <div class="summary-label">OT hrs</div>
      </div>
      <div class="summary-card">
        <div class="summary-val">${fmtHrs(totals.pto)}</div>
        <div class="summary-label">PTO hrs</div>
      </div>
      <div class="summary-card">
        <div class="summary-val">${fmtHrs(totals.total)}</div>
        <div class="summary-label">Total</div>
      </div>
    </div>

    ${rows.length === 0 ? '<div class="empty-state">No employees.</div>' : `
      <div class="table-wrap">
        <table id="reportTable">
          <thead>
            <tr>
              <th>Employee</th>
              <th class="num">Reg hrs</th>
              <th class="num">OT hrs</th>
              <th class="num">PTO hrs</th>
              <th class="num">Total</th>
              <th>Notes</th>
            </tr>
          </thead>
          <tbody>
            ${rows.map(r => `
              <tr>
                <td><b>${escapeHTML(r.emp.name)}</b></td>
                <td class="num reg-num">${fmtHrs(r.regular)}</td>
                <td class="num ot-num">${fmtHrs(r.overtime)}</td>
                <td class="num">${fmtHrs(r.pto)}</td>
                <td class="num"><b>${fmtHrs(r.total)}</b></td>
                <td style="font-size:12px;color:var(--text3);">${r.emp.overtimeEligible ? "" : "Exempt — no OT"}</td>
              </tr>
            `).join("")}
          </tbody>
        </table>
      </div>
    `}
  `;
  document.getElementById("rp-content").innerHTML = html;
}

function rpRenderDetail(start, weeksToInclude) {
  const active = S.employees.filter(e => e.active);
  if (active.length === 0) {
    document.getElementById("rp-content").innerHTML = '<div class="empty-state">No employees.</div>';
    return;
  }

  const dayLabels = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  const startDOW = S.settings.workWeekStartDay;

  // For each week in range, render a full breakdown
  let html = "";
  for (let w = 0; w < weeksToInclude; w++) {
    const wStart = new Date(start); wStart.setDate(wStart.getDate() + w*7);
    const wEnd = new Date(wStart); wEnd.setDate(wEnd.getDate() + 6);

    // Build header cells showing each day with date
    const dayHeaders = [];
    for (let d = 0; d < 7; d++) {
      const date = new Date(wStart); date.setDate(date.getDate() + d);
      const dowLabel = dayLabels[date.getDay()];
      const dateNum = date.getDate();
      dayHeaders.push(`<th class="num" style="min-width:58px;">${dowLabel}<br><span style="font-weight:400;color:var(--text3);">${dateNum}</span></th>`);
    }

    const rows = active.map(emp => {
      // Hours worked per day for this employee in this week
      const dayHours = [];
      for (let d = 0; d < 7; d++) {
        const dayStart = new Date(wStart); dayStart.setDate(dayStart.getDate() + d); dayStart.setHours(0,0,0,0);
        const dayEnd = new Date(dayStart); dayEnd.setDate(dayEnd.getDate() + 1);
        let hrs = 0;
        S.timeEntries.forEach(e => {
          if (e.employeeId !== emp.id) return;
          if (!e.clockIn || !e.clockOut) return;
          const t = new Date(e.clockIn).getTime();
          if (t >= dayStart.getTime() && t < dayEnd.getTime()) hrs += entryHours(e);
        });
        // Add PTO hours used on this day
        S.ptoTransactions.forEach(p => {
          if (p.employeeId !== emp.id || p.type !== "used") return;
          if (p.date === fmtDateISO(dayStart)) hrs += p.hours;
        });
        dayHours.push(hrs);
      }
      const h = calcWeekHours(emp.id, wStart);
      return { emp, dayHours, ...h };
    });

    const weekTotals = rows.reduce((acc, r) => {
      r.dayHours.forEach((h,i) => acc.days[i] = (acc.days[i]||0) + h);
      acc.regular += r.regular; acc.overtime += r.overtime; acc.pto += r.pto; acc.total += r.total;
      return acc;
    }, { days: [0,0,0,0,0,0,0], regular:0, overtime:0, pto:0, total:0 });

    html += `
      <div style="margin-bottom:20px;">
        <h3 style="font-size:15px;font-weight:600;margin-bottom:10px;color:var(--text1);">
          Week of ${fmtDateFull(wStart)} — ${fmtDateFull(wEnd)}
        </h3>
        <div class="table-wrap wide">
          <table>
            <thead>
              <tr>
                <th style="min-width:140px;">Employee</th>
                ${dayHeaders.join("")}
                <th class="num">Reg</th>
                <th class="num">OT</th>
                <th class="num">PTO</th>
                <th class="num">Total</th>
              </tr>
            </thead>
            <tbody>
              ${rows.map(r => `
                <tr>
                  <td><b>${escapeHTML(r.emp.name)}</b>${!r.emp.overtimeEligible ? '<br><span style="font-size:10px;color:var(--text3);">exempt</span>' : ''}</td>
                  ${r.dayHours.map(h => `<td class="num" style="${h===0?'color:var(--text3);':''}">${h > 0 ? fmtHrs(h) : '—'}</td>`).join("")}
                  <td class="num reg-num">${fmtHrs(r.regular)}</td>
                  <td class="num ot-num">${fmtHrs(r.overtime)}</td>
                  <td class="num">${fmtHrs(r.pto)}</td>
                  <td class="num"><b>${fmtHrs(r.total)}</b></td>
                </tr>
              `).join("")}
              <tr style="background:var(--bg2);">
                <td><b>Weekly total</b></td>
                ${weekTotals.days.map(h => `<td class="num" style="font-weight:500;">${h > 0 ? fmtHrs(h) : '—'}</td>`).join("")}
                <td class="num reg-num">${fmtHrs(weekTotals.regular)}</td>
                <td class="num ot-num">${fmtHrs(weekTotals.overtime)}</td>
                <td class="num">${fmtHrs(weekTotals.pto)}</td>
                <td class="num"><b>${fmtHrs(weekTotals.total)}</b></td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    `;
  }
  document.getElementById("rp-content").innerHTML = html;
}
