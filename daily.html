<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EZ AUTO — Daily Command Center</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Outfit',sans-serif;background:#F0F2F5;color:#111827;padding:1.75rem 1.5rem}
.wrap{max-width:900px;margin:0 auto}

.hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1.25rem}
.brand{font-size:10.5px;font-weight:600;letter-spacing:.14em;color:#9CA3AF;text-transform:uppercase}
.dateh{font-size:23px;font-weight:500;color:#111827;margin-top:3px}
.hdr-r{display:flex;align-items:center;gap:14px;padding-top:4px}
.saved{font-size:12px;color:#10B981;font-weight:500;min-width:48px;text-align:right}
.btnp{background:#111827;color:#fff;border:none;padding:8px 18px;border-radius:8px;font-size:13px;font-family:'Outfit',sans-serif;cursor:pointer;font-weight:500}
.btnp:hover{background:#374151}

.card{background:#fff;border:1px solid #E5E7EB;border-radius:12px;padding:.9rem 1.2rem;margin-bottom:.7rem}
.ct{font-size:10px;font-weight:600;letter-spacing:.13em;color:#9CA3AF;text-transform:uppercase;margin-bottom:.65rem}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:.7rem;margin-bottom:.7rem}

/* Banks */
.brow{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid #F9FAFB}
.brow:last-child{border-bottom:none}
.blbl{font-size:13px;color:#6B7280}
.bamt{font-size:14px;font-family:'JetBrains Mono',monospace;cursor:pointer;border-radius:5px;padding:2px 6px;transition:background .1s;border:1px solid transparent}
.bamt:hover{background:#F3F4F6;border-color:#E5E7EB}
.bamt.neg{color:#DC2626}
.binp{font-size:14px;font-family:'JetBrains Mono',monospace;border:1px solid #6366F1;border-radius:5px;padding:2px 6px;width:130px;text-align:right;outline:none;background:#EEF2FF;color:#111827}
.trow{display:flex;justify-content:space-between;align-items:center;padding-top:9px;margin-top:7px;border-top:2px solid #F3F4F6}
.tlbl{font-size:11px;font-weight:600;letter-spacing:.07em;color:#9CA3AF;text-transform:uppercase}
.tamt{font-size:22px;font-weight:500;font-family:'JetBrains Mono',monospace}
.pos{color:#16A34A}.neg2{color:#DC2626}

/* Todos */
.tdi{display:flex;align-items:flex-start;gap:9px;padding:5px 0;border-bottom:1px solid #F9FAFB}
.tdi:last-child{border-bottom:none}
.tdtxt{font-size:12.5px;line-height:1.45;flex:1;color:#374151}
.tdtxt.done{text-decoration:line-through;color:#D1D5DB}
.tddel{font-size:15px;color:#E5E7EB;cursor:pointer;background:none;border:none;padding:0 2px;flex-shrink:0;transition:color .1s}
.tddel:hover{color:#EF4444}
.tdadd{display:flex;gap:7px;margin-top:8px;padding-top:8px;border-top:1px solid #F3F4F6}
.tdadd input{flex:1;font-size:13px;font-family:'Outfit',sans-serif;border:1px solid #E5E7EB;border-radius:7px;padding:5px 9px;outline:none;color:#374151}
.tdadd input:focus{border-color:#6366F1}
.btnadd{background:#F3F4F6;border:none;padding:0 12px;border-radius:7px;cursor:pointer;font-size:17px;color:#9CA3AF}
.btnadd:hover{background:#E5E7EB;color:#374151}
.tdcb{width:14px;height:14px;cursor:pointer;accent-color:#16A34A;flex-shrink:0;margin-top:2px}

/* Past Due */
.pd-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:12px}
.pd-col{background:#F9FAFB;border-radius:10px;padding:.75rem 1rem;border:1px solid #F3F4F6}
.pd-col-lbl{font-size:10px;font-weight:600;letter-spacing:.1em;color:#9CA3AF;text-transform:uppercase;margin-bottom:8px}
.pd-inp-row{display:flex;align-items:center;gap:10px}
.pd-inp{font-size:22px;font-weight:500;font-family:'JetBrains Mono',monospace;border:none;background:transparent;outline:none;color:#111827;width:110px;padding:0}
.pd-pct{font-size:13px;color:#9CA3AF;font-family:'JetBrains Mono',monospace}
.pd-dot{width:11px;height:11px;border-radius:50%;background:#E5E7EB;flex-shrink:0;transition:background .2s;margin-left:auto}
.pd-dot.green{background:#16A34A}.pd-dot.yellow{background:#D97706}.pd-dot.red{background:#DC2626}
.pd-bar{border-radius:8px;padding:10px 16px;font-size:13px;font-weight:600;letter-spacing:.04em;text-align:center;transition:all .2s}
.pd-bar.empty{background:#F3F4F6;color:#9CA3AF;font-size:12px}
.pd-bar.green{background:#DCFCE7;color:#15803D}
.pd-bar.yellow{background:#FEF9C3;color:#92400E}
.pd-bar.red{background:#FEE2E2;color:#B91C1C}

/* Notes — pen writing lines */
.notes-lines{
  min-height:140px;
  background-image:repeating-linear-gradient(transparent,transparent 27px,#E5E7EB 27px,#E5E7EB 28px);
  background-size:100% 28px;
  padding-top:6px;
}

/* Chart */
.chart-area{width:100%;overflow:hidden}
.chart-area svg{display:block}

/* ── PRINT ─────────────────────────────────────────────── */
@media print{
  @page{size:letter portrait;margin:.34in .44in}
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
  body{background:#F0F2F5;padding:0}

  /* Hide digital-only elements */
  .noprint,#cash-section,#rollover{display:none!important}
  .btnp,.saved,.tddel,.tdadd{display:none!important}

  /* General */
  .wrap{max-width:100%}
  .card{padding:.42rem .72rem;margin-bottom:.28rem;border-radius:8px;break-inside:avoid}
  .r2{gap:.28rem;margin-bottom:.28rem}
  .ct{font-size:8px;letter-spacing:.11em;margin-bottom:.28rem}

  /* Header */
  .hdr{margin-bottom:.5rem}
  .dateh{font-size:14.5px;margin-top:2px}
  .brand{font-size:8.5px}

  /* Banks */
  .brow{padding:2px 0}
  .blbl{font-size:10.5px}
  .bamt{font-size:11px;padding:1px 3px}
  .trow{padding-top:4px;margin-top:4px}
  .tamt{font-size:16px}
  .tlbl{font-size:8.5px}

  /* Todos — 2 columns on print */
  #todos{columns:2;column-gap:.75rem}
  .tdi{padding:2px 0;break-inside:avoid;border-bottom:none}
  .tdtxt{font-size:10.5px;line-height:1.3}
  .tdcb{width:11px;height:11px;margin-top:1px}

  /* Past Due */
  .pd-grid{gap:.45rem;margin-bottom:7px}
  .pd-col{padding:.4rem .65rem;border-radius:7px}
  .pd-col-lbl{font-size:8px;margin-bottom:4px}
  .pd-inp{font-size:18px}
  .pd-pct{font-size:10.5px}
  .pd-dot{width:9px;height:9px}
  .pd-bar{padding:6px 12px;font-size:10.5px;border-radius:6px}

  /* Notes — compact enough to fit on page 1 with default margins */
  #notes-card .notes-lines{min-height:220px;background-image:repeating-linear-gradient(transparent,transparent 27px,#E5E7EB 27px,#E5E7EB 28px)}

  /* Chart auto-scales height from viewBox aspect ratio */
}

/* Dark mode */
@media(prefers-color-scheme:dark){
  body{background:#0D1117;color:#F0F6FC}
  .dateh,.tamt{color:#F0F6FC}
  .card{background:#161B22;border-color:#30363D}
  .blbl{color:#8B949E}
  .bamt{color:#E6EDF3}
  .bamt:hover{background:#21262D;border-color:#30363D}
  .bamt.neg{color:#F85149}
  .binp{background:#1C2128;color:#E6EDF3;border-color:#58A6FF}
  .brow,.trow,.tdi,.tdadd{border-color:#21262D}
  .trow{border-color:#30363D}
  .tdtxt{color:#C9D1D9}
  .tdtxt.done{color:#484F58}
  .tdadd input{background:#21262D;border-color:#30363D;color:#E6EDF3}
  .tdadd input:focus{border-color:#58A6FF}
  .btnadd{background:#21262D;color:#8B949E}
  .btnadd:hover{background:#30363D}
  .tddel{color:#30363D}
  .tddel:hover{color:#F85149}
  .pd-col{background:#1C2128;border-color:#30363D}
  .pd-inp{color:#E6EDF3}
  .pd-pct{color:#6B7280}
  .pd-bar.empty{background:#21262D;color:#6B7280}
  .notes-lines{background-image:repeating-linear-gradient(transparent,transparent 27px,#30363D 27px,#30363D 28px)}
  .neg2{color:#F85149}
}
</style>
</head>
<body>
<div id="lockscreen" style="position:fixed;inset:0;background:#111827;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999">

      OPEN
    </button>
    <div id="pw-err" style="color:#F87171;font-size:12px;text-align:center;margin-top:10px;min-height:18px"></div>
  </div>
</div>

<div class="wrap">

<div id="rollover" style="background:#ECFDF5;border:1px solid #D1FAE5;border-radius:10px;padding:.55rem 1rem;margin-bottom:.7rem;font-size:13px;color:#065F46;display:none"></div>

<div class="hdr">
  <div>
    <div class="brand">EZ AUTO &mdash; Daily Command Center</div>
    <div class="dateh" id="dateh"></div>
  </div>
  <div class="hdr-r">
    <span class="saved" id="saved"></span>
    <button class="btnp noprint" onclick="window.print()">Print</button>
  </div>
</div>

<!-- Row 1: Banks + Todos -->
<div class="r2">
  <div class="card">
    <div class="ct">Cash Position</div>
    <div id="banks"></div>
    <div class="trow">
      <span class="tlbl">Net Position</span>
      <span class="tamt" id="net"></span>
    </div>
  </div>
  <div class="card">
    <div class="ct">To-Do</div>
    <div id="todos"></div>
    <div class="tdadd noprint">
      <input id="new-todo" type="text" placeholder="Add item...">
      <button class="btnadd" onclick="addTodo()">+</button>
    </div>
  </div>
</div>

<!-- Past Due — full width -->
<div class="card">
  <div class="ct">Past Due %</div>
  <div class="pd-grid">
    <div class="pd-col">
      <div class="pd-col-lbl">Morning</div>
      <div class="pd-inp-row">
        <input id="pd-m" class="pd-inp" placeholder="—" maxlength="8">
        <span class="pd-pct" id="pd-m-pct"></span>
        <div class="pd-dot" id="pd-m-dot"></div>
      </div>
    </div>
    <div class="pd-col">
      <div class="pd-col-lbl">Closing</div>
      <div class="pd-inp-row">
        <input id="pd-c" class="pd-inp" placeholder="—" maxlength="8">
        <span class="pd-pct" id="pd-c-pct"></span>
        <div class="pd-dot" id="pd-c-dot"></div>
      </div>
    </div>
  </div>
  <div class="pd-bar empty" id="pd-bar">&mdash;&nbsp; Enter a reading above</div>
</div>

<!-- PD Trend chart — prints at bottom of page -->
<div class="card" id="pd-chart-card">
  <div class="ct">Past Due % &mdash; 7-Month Trend</div>
  <div class="chart-area" id="pd-chart"></div>
</div>

<!-- Cash trend — screen only -->
<div id="cash-section" class="noprint">
  <div class="card">
    <div class="ct">Net Cash Position &mdash; Recent History</div>
    <div class="chart-area" id="cash-chart"></div>
  </div>
</div>

<!-- Notes — pen writing, always last -->
<div class="card" id="notes-card">
  <div class="ct">Notes</div>
  <div class="notes-lines"></div>
</div>

</div>

</div><!-- end wrap -->

// Firebase Realtime Database
const FB_URL='https://ez-auto-3ec10-default-rtdb.firebaseio.com/ezauto';
const PASSWORD='010892';

function checkPw(){
  const val=document.getElementById('pw-input').value;
  if(val===PASSWORD){
    document.getElementById('lockscreen').style.display='none';
    init();
  }else{
    document.getElementById('pw-err').textContent='Incorrect password';

const store={
  async get(key){
    try{
      const r=await fetch(FB_URL+'/'+key+'.json');
      const val=await r.json();
      return val?{value:typeof val==='string'?val:JSON.stringify(val)}:null;
    }catch(e){return null;}
  },
  async set(key,value){
    try{
      await fetch(FB_URL+'/'+key+'.json',{

        headers:{'Content-Type':'application/json'},
        body:value

};

const fmt=n=>(n<0?'-$':'$')+Math.abs(n).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtPct=v=>v===null?'':(v*100).toFixed(1)+'%';
function parsePct(s){if(!s||!s.trim())return null;const v=parseFloat(s.replace(/[^0-9.-]/g,''));return isNaN(v)?null:(v>1?v/100:v);}
const pdZone=v=>v===null?null:v>=0.30?'red':v>=0.20?'yellow':'green';
const pdLabel=v=>v===null?null:v>=0.30?'ABOVE 30% \u2014 ACTION NEEDED':v>=0.20?'20\u201330% \u2014 WATCH CLOSELY':'BELOW 20% \u2014 IN THE GREEN';

function renderBanks(){
  const c=document.getElementById('banks');c.innerHTML='';
  const sorted=[...banks].sort((a,b)=>b.amount-a.amount);
  sorted.forEach((b,i)=>{
    const row=document.createElement('div');row.className='brow';
    const lbl=document.createElement('span');lbl.className='blbl';
    lbl.style.display='flex';lbl.style.alignItems='center';lbl.style.gap='7px';
    if(BANK_LOGOS[b.id]){
      const icon=document.createElement('span');
      icon.innerHTML=BANK_LOGOS[b.id];
      icon.style.cssText='display:flex;align-items:center;flex-shrink:0';
      lbl.appendChild(icon);
    }
    lbl.appendChild(document.createTextNode(b.label));
    const amt=document.createElement('span');amt.className='bamt'+(b.amount<0?' neg':'');amt.textContent=fmt(b.amount);amt.title='Click to edit';
    amt.addEventListener('click',()=>editBank(b.id,amt));
    row.appendChild(lbl);row.appendChild(amt);c.appendChild(row);
  });
  renderNet();
}
function editBank(id,span){
  const idx=banks.findIndex(b=>b.id===id);
  const inp=document.createElement('input');inp.type='text';inp.className='binp';inp.value=banks[idx].amount;
  span.replaceWith(inp);inp.focus();inp.select();
  const commit=()=>{const v=parseFloat(inp.value.replace(/[^-\d.]/g,''));if(!isNaN(v))banks[idx].amount=v;renderBanks();scheduleSave();};
  inp.addEventListener('blur',commit);
  inp.addEventListener('keydown',e=>{if(e.key==='Enter')inp.blur();if(e.key==='Escape')renderBanks();});
}
function renderNet(){
  const total=banks.reduce((s,b)=>s+b.amount,0);
  const el=document.getElementById('net');el.textContent=fmt(total);el.className='tamt '+(total<0?'neg2':'pos');
}

function renderTodos(){
  const c=document.getElementById('todos');c.innerHTML='';
  todos.forEach(t=>{
    const row=document.createElement('div');row.className='tdi';
    const cb=document.createElement('input');cb.type='checkbox';cb.className='tdcb';cb.checked=t.done;
    cb.addEventListener('change',()=>{t.done=cb.checked;renderTodos();scheduleSave();});
    const txt=document.createElement('span');txt.className='tdtxt'+(t.done?' done':'');txt.textContent=t.text;
    const del=document.createElement('button');del.className='tddel noprint';del.textContent='\u00d7';
    del.addEventListener('click',()=>{todos=todos.filter(x=>x.id!==t.id);renderTodos();scheduleSave();});
    row.appendChild(cb);row.appendChild(txt);row.appendChild(del);c.appendChild(row);
  });
}
function addTodo(){
  const inp=document.getElementById('new-todo');const text=inp.value.trim();if(!text)return;
  todos.push({id:Date.now(),text,done:false});inp.value='';renderTodos();scheduleSave();
}
document.getElementById('new-todo').addEventListener('keydown',e=>{if(e.key==='Enter')addTodo();});

function renderPD(){
  const v=pd.closing!==null?pd.closing:pd.morning;
  const zone=pdZone(v);
  document.getElementById('pd-m-pct').textContent=fmtPct(pd.morning);
  document.getElementById('pd-c-pct').textContent=fmtPct(pd.closing);
  document.getElementById('pd-m-dot').className='pd-dot'+(pd.morning!==null?' '+pdZone(pd.morning):'');
  document.getElementById('pd-c-dot').className='pd-dot'+(pd.closing!==null?' '+pdZone(pd.closing):'');
  const bar=document.getElementById('pd-bar');
  if(!zone){bar.className='pd-bar empty';bar.innerHTML='&mdash;&nbsp; Enter a reading above';}
  else{bar.className='pd-bar '+zone;bar.textContent=pdLabel(v);}
}

function getPDPoints(){
  const map=new Map();
  SEED_PD.forEach(([d,v])=>map.set(d,v));
  history.forEach(h=>{const v=h.pdClosing!=null?h.pdClosing:h.pdMorning;if(v!=null)map.set(h.date,v);});
  const tv=pd.closing!==null?pd.closing:pd.morning;
  if(tv!==null)map.set(todayKey,tv);
  return Array.from(map.entries()).sort((a,b)=>a[0].localeCompare(b[0])).map(([d,v])=>({d,v}));
}

function buildPDSVG(){
  const W=820,H=185;
  const pts=getPDPoints();
  if(pts.length<2)return null;
  const PL=34,PR=8,PT=10,PB=20;
  const cW=W-PL-PR,cH=H-PT-PB;
  const maxV=0.42;
  const xS=i=>PL+i/(pts.length-1)*cW;
  const yS=v=>PT+cH*(1-v/maxV);
  const y30=yS(0.30),y20=yS(0.20),y0=yS(0);

  const monthRanges={};
  pts.forEach((p,i)=>{
    const mo=p.d.substring(0,7);
    if(!monthRanges[mo])monthRanges[mo]={first:i,last:i};
    monthRanges[mo].last=i;
  });

  let s=`<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" width="100%" style="display:block">`;
  // width="100%" + no explicit height → browser scales height from viewBox ratio, always fills full container width
  s+=`<rect x="${PL}" y="${PT}" width="${cW}" height="${Math.max(y30-PT,0).toFixed(1)}" fill="#FEF2F2"/>`;
  s+=`<rect x="${PL}" y="${y30.toFixed(1)}" width="${cW}" height="${Math.max(y20-y30,0).toFixed(1)}" fill="#FFFBEB"/>`;
  s+=`<rect x="${PL}" y="${y20.toFixed(1)}" width="${cW}" height="${Math.max(y0-y20,0).toFixed(1)}" fill="#F0FDF4"/>`;

  // Horizontal grid lines
  [[0.30,'30%'],[0.20,'20%'],[0.10,'10%']].forEach(([pct,lbl])=>{
    const y=yS(pct);
    s+=`<line x1="${PL}" y1="${y.toFixed(1)}" x2="${PL+cW}" y2="${y.toFixed(1)}" stroke="#E5E7EB" stroke-width="0.5" stroke-dasharray="3,2"/>`;
    s+=`<text x="${PL-3}" y="${(y+3.5).toFixed(1)}" font-size="8" fill="#9CA3AF" text-anchor="end" font-family="JetBrains Mono,monospace">${lbl}</text>`;
  });

  // Month dividers + labels centered over each month's data
  Object.entries(monthRanges).forEach(([mo,{first,last}])=>{
    if(last<pts.length-1){
      const xDiv=(xS(last)+xS(last+1))/2;
      s+=`<line x1="${xDiv.toFixed(1)}" y1="${PT}" x2="${xDiv.toFixed(1)}" y2="${y0.toFixed(1)}" stroke="#E5E7EB" stroke-width="0.75"/>`;
    }
    const xLabel=((xS(first)+xS(last))/2).toFixed(1);
    const label=new Date(pts[last].d+'T12:00:00').toLocaleDateString('en-US',{month:'short',year:'2-digit'});
    s+=`<text x="${xLabel}" y="${(H-5).toFixed(1)}" font-size="8" fill="#6B7280" text-anchor="middle" font-family="JetBrains Mono,monospace">${label}</text>`;
  });

  // Trend line
  const path=pts.map((p,i)=>(i===0?'M':'L')+xS(i).toFixed(1)+','+yS(p.v).toFixed(1)).join(' ');
  s+=`<path d="${path}" fill="none" stroke="#818CF8" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>`;

  // Dots
  pts.forEach((p,i)=>{
    const col=p.v>=0.30?'#DC2626':p.v>=0.20?'#D97706':'#16A34A';
    s+=`<circle cx="${xS(i).toFixed(1)}" cy="${yS(p.v).toFixed(1)}" r="2.5" fill="${col}" stroke="white" stroke-width="1"/>`;
  });

  s+='</svg>';
  return s;
}

function renderPDChart(){
  const container=document.getElementById('pd-chart');
  const svg=buildPDSVG();
  container.innerHTML=svg||'<div style="font-size:13px;color:#9CA3AF;padding:8px 0">No data yet.</div>';
}

function renderCashChart(){
  const container=document.getElementById('cash-chart');
  const entries=history.filter(h=>h.bankTotal!=null).slice(-20);
  if(entries.length<2){container.innerHTML='<div style="font-size:13px;color:#9CA3AF;padding:8px 0">Cash history builds after your first day rollover.</div>';return;}
  const W=820;const H=90;
  const PL=48,PR=8,PT=8,PB=18;
  const cW=W-PL-PR,cH=H-PT-PB;
  const vals=entries.map(h=>h.bankTotal);
  const minV=Math.min(...vals),maxV=Math.max(...vals),range=maxV-minV||1;
  const barW=Math.max(cW/entries.length-3,4);
  let s=`<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" width="100%" style="display:block">`;
  entries.forEach((e,i)=>{
    const x=PL+i*(cW/entries.length);
    const bH=Math.max((e.bankTotal-minV)/range*cH,4);
    const y=PT+cH-bH;
    const dt=new Date(e.date+'T12:00:00').toLocaleDateString('en-US',{month:'numeric',day:'numeric'});
    s+=`<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${barW.toFixed(1)}" height="${bH.toFixed(1)}" fill="${e.bankTotal>=0?'#16A34A':'#DC2626'}" rx="2"/>`;
    s+=`<text x="${(x+barW/2).toFixed(1)}" y="${H-4}" font-size="7.5" fill="${isDark?'#484F58':'#9CA3AF'}" text-anchor="middle" font-family="JetBrains Mono,monospace">${dt}</text>`;
  });
  const fmtK=v=>'$'+(v/1000).toFixed(0)+'k';
  s+=`<text x="${PL-3}" y="${PT+6}" font-size="7.5" fill="${isDark?'#6B7280':'#9CA3AF'}" text-anchor="end" font-family="JetBrains Mono,monospace">${fmtK(maxV)}</text>`;
  s+=`<text x="${PL-3}" y="${PT+cH}" font-size="7.5" fill="${isDark?'#6B7280':'#9CA3AF'}" text-anchor="end" font-family="JetBrains Mono,monospace">${fmtK(minV)}</text>`;
  s+='</svg>';
  container.innerHTML=s;
}

['m','c'].forEach(k=>{
  const inp=document.getElementById('pd-'+k);
  const key=k==='m'?'morning':'closing';
  inp.addEventListener('keydown',e=>{
    if(e.key==='Enter'){
      const v=parsePct(inp.value);
      pd[key]=v;
      if(v!==null)inp.value=(v*100).toFixed(1);
      renderPD();
      renderPDChart();
      scheduleSave();
      inp.blur();
    }
  });
  inp.addEventListener('blur',()=>{
    const v=parsePct(inp.value);
    pd[key]=v;
    if(v!==null)inp.value=(v*100).toFixed(1);
    renderPD();
    scheduleSave();
  });
});

function scheduleSave(){clearTimeout(saveTimer);saveTimer=setTimeout(doSave,700);}
async function doSave(){
  try{
    await store.set('ezauto_state',JSON.stringify({date:todayKey,banks,todos,pd}));
    await store.set('ezauto_history',JSON.stringify(history));
    const el=document.getElementById('saved');el.textContent='\u2713 Saved';setTimeout(()=>el.textContent='',2000);
  }catch(e){}
}

async function init(){
  try{const hr=await store.get('ezauto_history');if(hr)history=JSON.parse(hr.value);}catch(e){}
  try{
    const sr=await store.get('ezauto_state');
    if(sr){
      const sv=JSON.parse(sr.value);
      if(sv.date!==todayKey){
        const pvd=sv.pd||{morning:null,closing:null};
        history=[...history,{date:sv.date,bankTotal:(sv.banks||[]).reduce((s,b)=>s+b.amount,0),pdMorning:pvd.morning,pdClosing:pvd.closing}].slice(-60);
        // Restore amounts into DB order
        const amtMap={}; (sv.banks||[]).forEach(b=>amtMap[b.id]=b.amount);
        banks=DB.map(b=>({...b,amount:amtMap[b.id]!==undefined?amtMap[b.id]:b.amount}));
        todos=(sv.todos||[]).filter(t=>!t.done);
        const n=document.getElementById('rollover');
        const d=new Date(sv.date+'T12:00:00').toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
        n.textContent='\u2713 New day \u2014 '+todos.length+' open item'+(todos.length!==1?'s':'')+' carried from '+d+'.';
        n.style.display='block';
      }else{
        // Restore amounts into DB order
        const amtMap={}; (sv.banks||[]).forEach(b=>amtMap[b.id]=b.amount);
        banks=DB.map(b=>({...b,amount:amtMap[b.id]!==undefined?amtMap[b.id]:b.amount}));
        todos=sv.todos||todos;pd=sv.pd||pd;
      }
    }
  }catch(e){}
  renderBanks();renderTodos();renderPD();
  if(pd.morning!==null)document.getElementById('pd-m').value=(pd.morning*100).toFixed(1);
  if(pd.closing!==null)document.getElementById('pd-c').value=(pd.closing*100).toFixed(1);
  requestAnimationFrame(()=>{renderPDChart();renderCashChart();});
}
